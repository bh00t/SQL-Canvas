    <script>
        (function () {
            if (!('serviceWorker' in navigator)) return;

            // Inline SW as a Blob — no separate sw.js file needed
            const SW_VERSION = Date.now(); // bumped automatically on each page load/deploy
            const swCode = `
const CACHE = 'sqlcanvas-v' + ${SW_VERSION};
self.addEventListener('install', e => {
    // Skip waiting so the new SW activates immediately
    self.skipWaiting();
});
self.addEventListener('activate', e => {
    e.waitUntil(
        caches.keys().then(keys =>
            Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
        ).then(() => self.clients.claim())
    );
});
self.addEventListener('fetch', e => {
    // Network-first for HTML (index.html), cache-first for everything else
    const isHTML = e.request.mode === 'navigate' ||
                   e.request.headers.get('accept')?.includes('text/html');
    if (isHTML) {
        e.respondWith(
            fetch(e.request).then(res => {
                const clone = res.clone();
                caches.open(CACHE).then(c => c.put(e.request, clone));
                return res;
            }).catch(() => caches.match(e.request))
        );
    } else {
        e.respondWith(
            caches.match(e.request).then(cached => cached ||
                fetch(e.request).then(res => {
                    const clone = res.clone();
                    caches.open(CACHE).then(c => c.put(e.request, clone));
                    return res;
                })
            )
        );
    }
});
`;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);

            navigator.serviceWorker.register(swUrl, { scope: './' })
                .then(reg => {
                    // If a new SW is waiting, activate it immediately
                    if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
                    reg.addEventListener('updatefound', () => {
                        const newSW = reg.installing;
                        newSW?.addEventListener('statechange', () => {
                            if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                                // New version ready — reload silently
                                window.location.reload();
                            }
                        });
                    });
                })
                .catch(() => {}); // Silently fail if SW not supported (e.g. file://)

            // Reload if the controller changes (new SW took over)
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) { refreshing = true; window.location.reload(); }
            });

    <!-- Move Engine Functions Outside Babel to avoid transpilation helper injections into Web Workers -->
    <script>
        /* ══════════════════════════════════════════════════════════════════════
           TWO-PASS AST-DRIVEN SQL MINIFICATION ENGINE
        ══════════════════════════════════════════════════════════════════════ */
        function astMinifyEngine(sql, enableAutoAlias) {
            if (!sql.trim()) return '';

            // Phase 1: Lexical Tokenisation
            let tokens = [], i = 0;
            const isWC = c => /[a-zA-Z0-9_$]/.test(c);
            const isOC = c => /[=<>,\(\)\+\-\*\/\;\|\.\:\!\@\#\%\^\&\~\?\[\]]/.test(c);

            while (i < sql.length) {
                const ch = sql[i];

                if (ch === "'") {
                    let s = ch; i++;
                    while (i < sql.length) {
                        s += sql[i];
                        if (sql[i] === "'" && sql[i+1] === "'") { s += "'"; i+=2; continue; }
                        if (sql[i] === "'") { i++; break; }
                        i++;
                    }
                    tokens.push({ type:'string', val:s }); continue;
                }
                if (ch === '"') {
                    let s = ch; i++;
                    while (i < sql.length) { s += sql[i]; if (sql[i]==='"'){i++;break;} i++; }
                    tokens.push({ type:'word', val:s }); continue;
                }
                if (ch === '`') {
                    let s = ch; i++;
                    while (i < sql.length) { s += sql[i]; if (sql[i]==='`'){i++;break;} i++; }
                    tokens.push({ type:'word', val:s }); continue;
                }
                if (ch==='-' && sql[i+1]==='-') {
                    i+=2;
                    while (i<sql.length && sql[i]!=='\n' && sql[i]!=='\r') i++;
                    if (i<sql.length && sql[i]==='\r') i++;
                    if (i<sql.length && sql[i]==='\n') i++;
                    continue;
                }
                if (ch==='/' && sql[i+1]==='*') {
                    i+=2;
                    while (i<sql.length){ if(sql[i]==='*'&&sql[i+1]==='/'){i+=2;break;} i++; }
                    continue;
                }
                if (/\s/.test(ch)) {
                    let ws=ch; i++;
                    while (i<sql.length && /\s/.test(sql[i])) { ws+=sql[i]; i++; }
                    tokens.push({ type: (ws.includes('\n')||ws.includes('\r')) ? 'newline' : 'space', val:'\n' });
                    continue;
                }
                if (isOC(ch)) { tokens.push({type:'operator',val:ch}); i++; continue; }
                if (isWC(ch)) {
                    let w=ch; i++;
                    while (i<sql.length && isWC(sql[i])) { w+=sql[i]; i++; }
                    tokens.push({type:'word',val:w}); continue;
                }
                tokens.push({type:'unknown',val:ch}); i++;
            }

            // Phase 1.5: Compound identifiers
            let merged = [];
            for (let j=0; j<tokens.length; j++) {
                const t = tokens[j];
                if (t.type==='word') {
                    let c=t.val, la=j+1;
                    while(tokens[la]&&tokens[la].type==='space') la++;
                    if(tokens[la]&&tokens[la].val==='.') {
                        la++;
                        while(tokens[la]&&tokens[la].type==='space') la++;
                        if(tokens[la]&&(tokens[la].type==='word'||tokens[la].val==='*')){
                            c+='.'+tokens[la].val; j=la;
                            let nl=la+1;
                            while(tokens[nl]&&tokens[nl].type==='space') nl++;
                            if(tokens[nl]&&tokens[nl].val==='.'){
                                nl++;
                                while(tokens[nl]&&tokens[nl].type==='space') nl++;
                                if(tokens[nl]&&(tokens[nl].type==='word'||tokens[nl].val==='*')){
                                    c+='.'+tokens[nl].val; j=nl;
                                }
                            }
                            merged.push({type:'word',val:c}); continue;
                        }
                    }
                }
                merged.push(t);
            }
            tokens = merged;

            // Phase 1.8: Split into statements
            const stmts=[], cur=[];
            for (const t of tokens) {
                cur.push(t);
                if(t.type==='operator'&&t.val===';'){stmts.push([...cur]);cur.length=0;}
            }
            if(cur.length) stmts.push(cur);

            const KW = new Set([
                'select','from','where','join','inner','left','right','full','cross','on','group','by','order',
                'having','limit','and','or','in','is','not','null','as','update','insert','into','values','set',
                'delete','truncate','merge','when','then','else','end','case','with','declare','begin','exception',
                'commit','rollback','create','replace','procedure','function','table','view','materialized',
                'boolean','int','varchar','timestamp','date','time','count','sum','max','min','avg','isnull',
                'coalesce','getdate','sysdate','dateadd','returning','extract','epoch','cast','over','partition',
                'rows','between','unbounded','preceding','current','row','exists','drop','alter','call','raise',
                'notice','if','elsif','loop','while','record','type','default','nullif','lag','lead','float','numeric'
            ]);
            const CT = new Set([
                'where','on','group','order','having','limit','select','insert','update','delete','truncate','merge',
                'set','values','declare','begin','exception','commit','rollback','returning','with','create','drop',
                'alter','if','elsif','loop','while','call','raise'
            ]);
            const isFuncFrom = (stmt, idx) => {
                for (let k=idx-1; k>=0; k--)
                    if(stmt[k].type==='word') return ['epoch','extract','substring','trim'].includes(stmt[k].val.toLowerCase());
                return false;
            };

            let result='', prevType=null;

            for (const stmt of stmts) {
                const dmlT={}, tAliases={}, genA=new Set();
                const dmlTargets = new Set();

                // Pass A: alias pre-computation
                {
                    let ps='NORMAL', pFrom=false, pExp=false, pD=0, psDmlVerb='';
                    const cands=[];
                    for (let j=0; j<stmt.length; j++) {
                        const t=stmt[j];
                        if(t.type==='operator'){
                            if(t.val==='('){pD++;pExp=false;}
                            else if(t.val===')'){if(pD>0)pD--;}
                            else if(t.val===';'){pFrom=false;pExp=false;}
                            else if(t.val===','&&pFrom)pExp=true;
                            continue;
                        }
                        if(t.type!=='word') continue;
                        const lw=t.val.toLowerCase(), cl=lw.replace(/["`]/g,'');
                        if(['update','delete','insert','truncate','merge'].includes(lw)){ps='EXPECT_TARGET';psDmlVerb=lw;}
                        else if(ps==='EXPECT_TARGET'){
                            if(!['into','from','table','overwrite','only'].includes(lw)){
                                dmlTargets.add(cl);
                                const dp=cl.split('.'); if(dp.length>1)dmlTargets.add(dp[dp.length-1]);
                                ps='NORMAL';
                                // Only UPDATE targets support aliases in Redshift — skip INSERT/DELETE/TRUNCATE/MERGE
                                if(psDmlVerb==='update'){
                                    const parts=cl.split('.'), base=parts[parts.length-1];
                                    let ni=j+1;
                                    while(stmt[ni]&&(stmt[ni].type==='space'||stmt[ni].type==='newline'))ni++;
                                    const nt=stmt[ni], nw2=nt?.val?.toLowerCase()||'';
                                    const nIA2=nt?.type==='word'&&!KW.has(nw2)&&!['set','where','from'].includes(nw2);
                                    if(nIA2){ tAliases[cl]=nw2; if(parts.length>1)tAliases[base]=nw2; j=ni; }
                                    else if(nw2==='as'){
                                        let ai=ni+1;
                                        while(stmt[ai]&&(stmt[ai].type==='space'||stmt[ai].type==='newline'))ai++;
                                        const act=stmt[ai]?.val?.toLowerCase();
                                        if(act&&stmt[ai]?.type==='word'&&!KW.has(act)){ tAliases[cl]=act; if(parts.length>1)tAliases[base]=act; j=ai; }
                                    } else if(enableAutoAlias&&cl.length>2&&!tAliases[cl]){
                                        // auto-alias the UPDATE target table too
                                        if(!cands.some(c=>c.cl===cl))cands.push({cl,base,parts});
                                    }
                                }
                            }
                        }
                        if(['from','join'].includes(lw)){
                            if(lw==='from'&&isFuncFrom(stmt,j)){}
                            else{pFrom=true;pExp=true;}
                        } else if(CT.has(lw)){pFrom=false;pExp=false;}
                        else if(lw==='as'){pExp=false;}
                        else if(pExp&&!KW.has(lw)){
                            pExp=false;
                            let ni=j+1;
                            while(stmt[ni]&&(stmt[ni].type==='space'||stmt[ni].type==='newline'))ni++;
                            const nt=stmt[ni], nw=nt?.val?.toLowerCase()||'';
                            const nIA=nt?.type==='word'&&!KW.has(nw), isF=nt?.val==='(';
                            const parts=cl.split('.'), base=parts[parts.length-1];
                            if(nIA){tAliases[cl]=nw; if(parts.length>1)tAliases[base]=nw; j=ni;}
                            else if(nw==='as'){
                                let ai=ni+1;
                                while(stmt[ai]&&(stmt[ai].type==='space'||stmt[ai].type==='newline'))ai++;
                                const act=stmt[ai]?.val?.toLowerCase();
                                if(act&&stmt[ai]?.type==='word'&&!KW.has(act)){
                                    tAliases[cl]=act; if(parts.length>1)tAliases[base]=act; j=ai;
                                }
                            } else if(enableAutoAlias&&cl.length>2&&!isF&&!dmlTargets.has(cl)&&!tAliases[cl]){
                                if(!cands.some(c=>c.cl===cl))cands.push({cl,base,parts});
                            }
                        }
                    }
                    if(enableAutoAlias&&cands.length>0){
                        const taken=new Set(Object.values(tAliases));
                        const isTk=a=>!a||KW.has(a)||taken.has(a)||a.length>3;
                        const commit=(tk,bk,alias,hd)=>{tAliases[tk]=alias;if(hd)tAliases[bk]=alias;genA.add(alias);taken.add(alias);};
                        for(const{cl,base,parts}of cands){
                            if(tAliases[cl])continue;
                            const np=base.split('_').filter(Boolean);
                            let alias=null;
                            if(!alias){const c=base[0].toLowerCase();if(!isTk(c))alias=c;}
                            if(!alias&&np.length>1){const c=np.map(p=>p[0]).join('').toLowerCase().slice(0,3);if(!isTk(c))alias=c;}
                            if(!alias&&base.length>=2){const c=base.slice(0,2).toLowerCase();if(!isTk(c))alias=c;}
                            if(!alias&&base.length>=3){const c=base.slice(0,3).toLowerCase();if(!isTk(c))alias=c;}
                            if(!alias){const bc=base[0].toLowerCase();for(let n=1;n<=99;n++){const c=bc+n;if(!isTk(c)){alias=c;break;}}}
                            if(!alias){for(let n=1;n<=99;n++){const c='t'+n;if(!isTk(c)){alias=c;break;}}}
                            if(alias)commit(cl,base,alias,parts.length>1);
                        }
                    }
                }

                // Pass B: transform + minify
                let fClause=false, expT=false, dmlSt='NORMAL', dep=0, inSetClause=false, dmlVerb='';
                for(let j=0; j<stmt.length; j++){
                    const t=stmt[j];
                    if(t.type==='space'||t.type==='newline'){
                        const nx=stmt[j+1], pv=stmt[j-1];
                        const isOp=(tok,cs)=>tok&&tok.type==='operator'&&cs.includes(tok.val);
                        const DN=['=',',',';','.','<','>','!',':','*','/','|','&',')'];
                        const DP=['=',',',';','.','<','>','!',':','*','/','|','&','('];
                        if(isOp(nx,DN)||isOp(pv,DP))continue;
                        if(t.type==='newline'){if(result.endsWith(' '))result=result.slice(0,-1);if(!result.endsWith('\n'))result+='\n';prevType='newline';}
                        else{if(prevType&&prevType!=='space'&&prevType!=='newline')result+=' ';prevType='space';}
                        continue;
                    }
                    let val=t.val;
                    if(t.type==='operator'){
                        if(t.val==='('){dep++;expT=false;}
                        else if(t.val===')'){if(dep>0)dep--;}
                        else if(t.val===';'){fClause=false;expT=false;}
                        else if(t.val===','&&fClause)expT=true;
                    }
                    if(t.type==='word'){
                        const lw=val.toLowerCase(), cl=lw.replace(/["`]/g,'');
                        if(['update','delete','insert','truncate','merge'].includes(lw)){dmlSt='EXPECT_TARGET';dmlVerb=lw;}
                        else if(dmlSt==='EXPECT_TARGET'){
                            if(!['into','from','table','overwrite','only'].includes(lw)){
                                dmlSt='NORMAL';
                                // Only UPDATE supports alias on target in Redshift — emit bare name for all others
                                if(dmlVerb==='update'){
                                    let ni=j+1;
                                    while(stmt[ni]&&(stmt[ni].type==='space'||stmt[ni].type==='newline'))ni++;
                                    const nw2=stmt[ni]?.val?.toLowerCase()||'';
                                    const aliasForTarget=tAliases[cl];
                                    const nextIsAlias=aliasForTarget&&nw2===aliasForTarget;
                                    const nextIsAs=nw2==='as';
                                    if(nextIsAlias||nextIsAs){
                                        result+=lw; prevType=t.type; continue;
                                    } else if(aliasForTarget){
                                        result+=lw+' '+aliasForTarget; prevType=t.type; continue;
                                    } else {
                                        result+=lw; prevType=t.type; continue;
                                    }
                                } else {
                                    result+=lw; prevType=t.type; continue;
                                }
                            }
                        }
                        if(['from','join'].includes(lw)){
                            if(lw==='from'&&isFuncFrom(stmt,j)){}
                            else{fClause=true;expT=true;}
                            inSetClause=false;
                        } else if(lw==='set'&&dmlSt==='NORMAL'){inSetClause=true;fClause=false;expT=false;}
                        else if(CT.has(lw)&&lw!=='set'){fClause=false;expT=false;inSetClause=false;}
                        else if(lw==='as'){expT=false;}
                        else if(expT&&!KW.has(lw)){
                            expT=false;
                            let ni=j+1;
                            while(stmt[ni]&&(stmt[ni].type==='space'||stmt[ni].type==='newline'))ni++;
                            const nw=stmt[ni]?.val?.toLowerCase()||'';
                            const nIA=stmt[ni]?.type==='word'&&!KW.has(nw);
                            if(nIA||nw==='as'){val=lw;}
                            else if(enableAutoAlias&&tAliases[cl]&&genA.has(tAliases[cl])){val=`${lw} ${tAliases[cl]}`;}
                            else{val=lw;}
                            result+=val; prevType=t.type; continue;
                        }
                        if(KW.has(lw)){val=lw;}
                        else{
                            const sk=Object.keys(tAliases).sort((a,b)=>b.length-a.length);
                            const ma=sk.find(k=>cl.startsWith(k+'.'));
                            // In SET clause, bare column names (no dot) are LHS assignments — don't alias them
                            if(ma){ val=tAliases[ma]+cl.slice(ma.length); }
                            else if(inSetClause&&!cl.includes('.')){ val=lw; }
                            else{ val=lw; }
                        }
                    }
                    result+=val; prevType=t.type;
                }
            }
            return result.trim();
        }

        /* ══════════════════════════════════════════════════════════════════════
           SQL BEAUTIFIER ENGINE  v3  — smart indent, all edge-case fixes
        ══════════════════════════════════════════════════════════════════════ */
        function sqlBeautify(sql) {
            if (!sql || !sql.trim()) return '';
            const IND = '    '; // 4-space indent unit

            // ── Step 0: Pre-normalize raw input ──────────────────────────
            // Fix `| |` → `||` (spaces inside concat operator in source)
            sql = sql.replace(/\|\s+\|/g, '||');
            // Fix `: =` → `:=` (spaces inside assignment operator in source)
            sql = sql.replace(/:\s*=/g, ':=');
            // Fix `:: ` type cast with space → `::` (col:: TEXT → col::TEXT)
            sql = sql.replace(/::\s+/g, '::');

            // ── Step 1: Tokenise ──────────────────────────────────────────
            // Types: STRING | IDENT (quoted) | COMMENT_LINE | COMMENT_BLOCK | WORD | OP | WS
            const toks = [];
            let i = 0;
            while (i < sql.length) {
                const ch = sql[i];
                // single-quoted string  'abc' / 'it''s'
                if (ch === "'") {
                    let s = "'"; i++;
                    while (i < sql.length) {
                        if (sql[i] === "'" && sql[i+1] === "'") { s += "''"; i += 2; }
                        else if (sql[i] === "'") { s += "'"; i++; break; }
                        else s += sql[i++];
                    }
                    toks.push({k:'STRING', v:s}); continue;
                }
                // double-quoted identifier
                if (ch === '"') {
                    let s = '"'; i++;
                    while (i < sql.length) { s += sql[i]; if (sql[i++] === '"') break; }
                    toks.push({k:'IDENT', v:s}); continue;
                }
                // backtick identifier
                if (ch === '`') {
                    let s = '`'; i++;
                    while (i < sql.length) { s += sql[i]; if (sql[i++] === '`') break; }
                    toks.push({k:'IDENT', v:s}); continue;
                }
                // block comment
                if (ch === '/' && sql[i+1] === '*') {
                    let s = '/*'; i += 2;
                    while (i < sql.length) {
                        if (sql[i] === '*' && sql[i+1] === '/') { s += '*/'; i += 2; break; }
                        s += sql[i++];
                    }
                    toks.push({k:'COMMENT_BLOCK', v:s}); continue;
                }
                // line comment
                if (ch === '-' && sql[i+1] === '-') {
                    let s = '--'; i += 2;
                    while (i < sql.length && sql[i] !== '\n') s += sql[i++];
                    toks.push({k:'COMMENT_LINE', v:s}); continue;
                }
                // cast operator ::
                if (ch === ':' && sql[i+1] === ':') {
                    toks.push({k:'OP', v:'::'}); i += 2; continue;
                }
                // PL/pgSQL assignment :=
                if (ch === ':' && sql[i+1] === '=') {
                    toks.push({k:'OP', v:':='}); i += 2; continue;
                }
                // concat operator ||
                if (ch === '|' && sql[i+1] === '|') {
                    toks.push({k:'OP', v:'||'}); i += 2; continue;
                }
                // whitespace — collapse entirely (we'll place our own)
                if (/\s/.test(ch)) { while (i < sql.length && /\s/.test(sql[i])) i++; continue; }
                // word / keyword / identifier
                if (/[a-zA-Z_$]/.test(ch)) {
                    let w = '';
                    while (i < sql.length && /[a-zA-Z0-9_$]/.test(sql[i])) w += sql[i++];
                    toks.push({k:'WORD', v:w}); continue;
                }
                // number
                if (/[0-9]/.test(ch)) {
                    let n = '';
                    while (i < sql.length && /[0-9._]/.test(sql[i])) n += sql[i++];
                    toks.push({k:'NUM', v:n}); continue;
                }
                // two-char operators
                if ((ch === '<' || ch === '>' || ch === '!') && /[=<>]/.test(sql[i+1])) {
                    toks.push({k:'OP', v:ch+sql[i+1]}); i += 2; continue;
                }
                toks.push({k:'OP', v:ch}); i++;
            }

            // ── Step 2: resolve multi-word keywords ──────────────────────
            // Flatten consecutive WORDs (separated only by discarded ws) into phrases
            // for matching. We use a lookahead matcher instead of pre-merging.

            // keywords that start a new TOP-LEVEL clause (own line, base indent of current depth)
            const TOP = new Set([
                'select','from','where','having','limit','offset',
                'set','values','returning',
                'union','union all','intersect','except',
                'begin','end','commit','rollback',
                'declare','exception','loop','elsif','raise',
                'nonatomic','language',
            ]);
            // JOIN keywords (own line, base indent)
            const JOINS = new Set([
                'join','inner join','left join','left outer join',
                'right join','right outer join','full join','full outer join','cross join',
                'natural join',
            ]);
            // DML / DDL starters (own line, blank line before if not first)
            const DML = new Set([
                'select','insert','insert into','update','delete','delete from',
                'merge','merge into','truncate','truncate table',
                'create','create table','create temporary table','create temp table',
                'create or replace','create or replace procedure','create or replace function',
                'create view','create materialized view',
                'drop','drop table','drop view','drop table if exists',
                'alter','alter table',
                'with',
                'call',
            ]);
            // sub-clause keywords — own line, indented one extra level
            const SUB = new Set(['and','or']);
            // CASE control keywords — own line, indented
            const CASE_KW = new Set(['when','then','else']);
            // these get their own line at base depth (no extra indent)
            const CLAUSE_NODENT = new Set(['on','using','where','having','set','returning','nonatomic','language']);

            // Peek helper: from token index idx, read up to `max` consecutive WORD tokens
            // (skipping nothing — whitespace already dropped). Returns array of lowercased words.
            const wordAt = (idx) => (toks[idx] && toks[idx].k === 'WORD') ? toks[idx].v.toLowerCase() : null;

            // Try to match a multi-word keyword starting at toks[idx].
            // Returns { phrase, consume } or null.
            const matchKw = (idx) => {
                const w0 = wordAt(idx); if (!w0) return null;
                const w1 = wordAt(idx+1);
                const w2 = wordAt(idx+2);
                const w3 = wordAt(idx+3);
                // try 4-word
                const p4 = [w0,w1,w2,w3].filter(Boolean).join(' ');
                const p3 = [w0,w1,w2].filter(Boolean).join(' ');
                const p2 = [w0,w1].filter(Boolean).join(' ');
                const p1 = w0;
                for (const [p, c] of [[p4,4],[p3,3],[p2,2],[p1,1]]) {
                    if (!p) continue;
                    if (TOP.has(p)||JOINS.has(p)||DML.has(p)||SUB.has(p)||CASE_KW.has(p)||CLAUSE_NODENT.has(p)||
                        p==='group by'||p==='order by'||p==='partition by'||p==='as'||
                        p==='insert into'||p==='delete from'||p==='create or replace'||
                        p==='left join'||p==='right join'||p==='full join'||p==='inner join'||
                        p==='left outer join'||p==='right outer join'||p==='full outer join'||
                        p==='cross join'||p==='natural join'||p==='union all'||
                        p==='drop table if exists'||p==='create temporary table'||p==='create temp table'||
                        p==='not in'||p==='not like'||p==='not null'||p==='is null'||p==='is not'||p==='is not null'||
                        p==='over'||p==='between'||p==='case'||p==='end'||p==='if'||p==='then'||p==='else'||
                        p==='row_number'||p==='group by'||p==='order by') {
                        return { phrase: p, consume: c };
                    }
                }
                return null;
            };

            // ── Step 3: Format ────────────────────────────────────────────
            let out = '';
            let depth = 0;          // subquery/paren depth → extra indent
            let col = 0;            // current column position on line
            // clause context stack — tracks what clause we're inside per depth
            // 'TOP' | 'SELECT_LIST' | 'FROM' | 'WHERE' | 'CASE' | 'SUBQ' | etc.
            const ctxStack = ['TOP'];
            const ctx = () => ctxStack[ctxStack.length-1];

            // Track whether each paren depth is a subquery or just a function call
            const subqDepths = new Set();

            const nl = (extraInd = 0) => {
                out = out.trimEnd();
                out += '\n' + IND.repeat(Math.max(0, depth + extraInd));
                col = (depth + extraInd) * 4;
            };

            const sp = () => { if (out.length && !out.endsWith('\n') && !out.endsWith(' ')) { out += ' '; col++; } };

            const write = (s) => { out += s; col += s.length; };

            // No-space-before operators
            const NSBL = new Set([',','.',';','(',')','::']);
            // No-space-after operators
            const NSAR = new Set(['.','(','::']);
            // operators where space on both sides is nice
            const SPACED_OPS = new Set(['=','<','>','<=','>=','!=','<>','+','-','*','/','%','||']);

            // Track previous non-ws token for spacing decisions
            let prevTok = null;

            // We process tokens linearly with lookahead
            let j = 0;
            const peek = (off=1) => toks[j+off] || null;

            // Is a paren at index j opening a subquery?
            const isSubqueryOpen = (idx) => {
                // look ahead past '(' for first meaningful token
                for (let k = idx+1; k < toks.length && k < idx+6; k++) {
                    const t = toks[k];
                    if (!t || t.k === 'COMMENT_LINE' || t.k === 'COMMENT_BLOCK') continue;
                    if (t.k === 'WORD') {
                        const lw = t.v.toLowerCase();
                        return lw === 'select' || lw === 'with';
                    }
                    break;
                }
                return false;
            };

            while (j < toks.length) {
                const tok = toks[j];

                // ── Comments ──
                if (tok.k === 'COMMENT_LINE') {
                    if (out.trimEnd().endsWith('\n') || out === '') { /* already on own line */ }
                    else nl();
                    write(tok.v.trimEnd());
                    nl();
                    prevTok = tok; j++; continue;
                }
                if (tok.k === 'COMMENT_BLOCK') {
                    nl(); write(tok.v.trim()); nl();
                    prevTok = tok; j++; continue;
                }

                // ── Strings / Identifiers — inline ──
                if (tok.k === 'STRING' || tok.k === 'IDENT') {
                    if (!out.endsWith(' ') && !out.endsWith('\n') && !out.endsWith('(') && !out.endsWith('.') && !out.endsWith('::') && out !== '') sp();
                    write(tok.v);
                    prevTok = tok; j++; continue;
                }

                // ── Numbers ──
                if (tok.k === 'NUM') {
                    if (!out.endsWith(' ') && !out.endsWith('\n') && !out.endsWith('(') && !out.endsWith('::') && out !== '') sp();
                    write(tok.v);
                    prevTok = tok; j++; continue;
                }

                // ── Operators ──
                if (tok.k === 'OP') {
                    const v = tok.v;

                    if (v === '(') {
                        const isSubq = isSubqueryOpen(j);
                        // no space before '(' if prev was a word (function call) or an ident
                        if (prevTok && (prevTok.k === 'WORD' || prevTok.k === 'IDENT')) { /* no space */ }
                        else if (!out.endsWith(' ') && !out.endsWith('\n') && out !== '') sp();
                        write('(');
                        depth++;
                        if (isSubq) {
                            subqDepths.add(depth);
                            ctxStack.push('SUBQ');
                            nl();
                        } else {
                            ctxStack.push('PAREN');
                        }
                        prevTok = tok; j++; continue;
                    }

                    if (v === ')') {
                        const wasSubq = subqDepths.has(depth);
                        if (wasSubq) {
                            subqDepths.delete(depth);
                            nl(-0); // close bracket on its own line at parent depth
                            // trim the indent we just added back to parent depth
                            out = out.trimEnd();
                            out += '\n' + IND.repeat(Math.max(0, depth-1));
                        }
                        depth = Math.max(0, depth-1);
                        if (ctxStack.length > 1) ctxStack.pop();
                        write(')');
                        prevTok = tok; j++; continue;
                    }

                    if (v === ',') {
                        write(',');
                        // In SELECT list / column list → newline + indent
                        // In function args / VALUES → keep inline (but newline if line too long)
                        const inSubqOrTop = ctx() === 'SUBQ' || ctx() === 'TOP' || ctx() === 'SELECT_LIST';
                        if (depth === 0 || inSubqOrTop || col > 80) {
                            nl();
                        } else {
                            // function args — single space
                            sp();
                        }
                        prevTok = tok; j++; continue;
                    }

                    if (v === ';') {
                        out = out.trimEnd();
                        write(';');
                        out += '\n\n';
                        col = 0;
                        depth = 0;
                        subqDepths.clear();
                        ctxStack.length = 1; ctxStack[0] = 'TOP';
                        prevTok = tok; j++; continue;
                    }
                    if (v === '.') {
                        write('.'); prevTok = tok; j++; continue;
                    }

                    if (v === '::') {
                        write('::'); prevTok = tok; j++; continue;
                    }

                    // PL/pgSQL assignment operator
                    if (v === ':=') {
                        sp(); write(':='); sp(); prevTok = tok; j++; continue;
                    }

                    // String concatenation
                    if (v === '||') {
                        sp(); write('||'); sp(); prevTok = tok; j++; continue;
                    }

                    // spaced operators
                    if (SPACED_OPS.has(v)) {
                        if (!out.endsWith(' ') && !out.endsWith('\n')) sp();
                        write(v); sp();
                        prevTok = tok; j++; continue;
                    }

                    // everything else (!, @, #, ~, etc.)
                    if (!out.endsWith(' ') && !out.endsWith('\n')) sp();
                    write(v);
                    prevTok = tok; j++; continue;
                }

                // ── WORD tokens — the main logic ──
                if (tok.k === 'WORD') {
                    const lw = tok.v.toLowerCase();

                    // ---- CASE expression ----
                    if (lw === 'case') {
                        sp(); write('CASE');
                        depth++;
                        ctxStack.push('CASE');
                        prevTok = tok; j++; continue;
                    }
                    if (lw === 'end' && ctx() === 'CASE') {
                        depth = Math.max(0, depth-1);
                        ctxStack.pop();
                        nl(); write('END');
                        prevTok = tok; j++; continue;
                    }
                    if ((lw === 'when' || lw === 'then' || lw === 'else') && ctx() === 'CASE') {
                        nl(); write(lw.toUpperCase()); sp();
                        prevTok = tok; j++; continue;
                    }

                    // ---- IF / ELSIF / THEN / ELSE (PL/pgSQL block) ----
                    if (lw === 'if' && ctx() !== 'CASE') {
                        nl(); write('IF'); sp();
                        prevTok = tok; j++; continue;
                    }
                    if (lw === 'elsif') {
                        nl(); write('ELSIF'); sp();
                        prevTok = tok; j++; continue;
                    }
                    if (lw === 'then' && ctx() !== 'CASE') {
                        sp(); write('THEN'); nl();
                        prevTok = tok; j++; continue;
                    }
                    if (lw === 'else' && ctx() !== 'CASE') {
                        nl(); write('ELSE'); nl();
                        prevTok = tok; j++; continue;
                    }
                    if (lw === 'end' && ctx() !== 'CASE') {
                        // end if / end loop
                        const nextW = wordAt(j+1);
                        nl(); write('END');
                        if (nextW === 'if' || nextW === 'loop') { sp(); write(nextW.toUpperCase()); j++; }
                        prevTok = tok; j++; continue;
                    }

                    // ---- BEGIN / END block ----
                    if (lw === 'begin') {
                        nl(0); write('BEGIN'); depth++; nl();
                        prevTok = tok; j++; continue;
                    }
                    if (lw === 'exception') {
                        depth = Math.max(0,depth-1); nl(); write('EXCEPTION'); depth++; nl();
                        prevTok = tok; j++; continue;
                    }
                    if (lw === 'declare') {
                        nl(0); write('DECLARE'); nl();
                        prevTok = tok; j++; continue;
                    }
                    if (lw === 'loop') {
                        sp(); write('LOOP'); depth++; nl();
                        prevTok = tok; j++; continue;
                    }

                    // ---- COMMIT / ROLLBACK / RETURN ----
                    if (lw === 'commit'||lw === 'rollback'||lw === 'return') {
                        nl(0); write(lw.toUpperCase());
                        prevTok = tok; j++; continue;
                    }

                    // ---- WITH (CTE) ----
                    if (lw === 'with' && depth === 0) {
                        if (out.trim()) { out = out.trimEnd(); out += '\n\n'; col = 0; }
                        write('WITH'); sp();
                        prevTok = tok; j++; continue;
                    }

                    // ---- DML starters at depth 0 ----
                    if (depth === 0) {
                        // CREATE [OR REPLACE] …
                        if (lw === 'create') {
                            if (out.trim()) { out = out.trimEnd(); out += '\n\n'; col = 0; }
                            // consume optional chain: create or replace procedure/function/table/view…
                            let phrase = 'CREATE'; j++;
                            while (j < toks.length && toks[j].k === 'WORD') {
                                const nw = toks[j].v.toLowerCase();
                                if (['or','replace','temporary','temp','table','view','materialized',
                                     'procedure','function','index','schema'].includes(nw)) {
                                    phrase += ' ' + nw.toUpperCase(); j++;
                                } else break;
                            }
                            write(phrase); sp(); prevTok = tok; continue;
                        }
                        if (lw === 'drop') {
                            if (out.trim()) { out = out.trimEnd(); out += '\n\n'; col = 0; }
                            let phrase = 'DROP'; j++;
                            while (j < toks.length && toks[j].k === 'WORD') {
                                const nw = toks[j].v.toLowerCase();
                                if (['table','view','index','schema','if','exists'].includes(nw)) {
                                    phrase += ' ' + nw.toUpperCase(); j++;
                                } else break;
                            }
                            write(phrase); sp(); prevTok = tok; continue;
                        }
                        if (lw === 'alter') {
                            if (out.trim()) { out = out.trimEnd(); out += '\n\n'; col = 0; }
                            write('ALTER'); sp(); prevTok = tok; j++; continue;
                        }
                        if (lw === 'insert') {
                            if (out.trim()) { out = out.trimEnd(); out += '\n\n'; col = 0; }
                            write('INSERT'); sp();
                            const nw = wordAt(j+1);
                            if (nw === 'into') { write('INTO'); sp(); j += 2; } else j++;
                            prevTok = tok; continue;
                        }
                        if (lw === 'update') {
                            if (out.trim()) { out = out.trimEnd(); out += '\n\n'; col = 0; }
                            write('UPDATE'); sp(); prevTok = tok; j++; continue;
                        }
                        if (lw === 'delete') {
                            if (out.trim()) { out = out.trimEnd(); out += '\n\n'; col = 0; }
                            write('DELETE'); sp();
                            const nw = wordAt(j+1);
                            if (nw === 'from') { write('FROM'); sp(); j += 2; } else j++;
                            prevTok = tok; continue;
                        }
                        if (lw === 'truncate') {
                            if (out.trim()) { out = out.trimEnd(); out += '\n\n'; col = 0; }
                            write('TRUNCATE'); sp();
                            const nw = wordAt(j+1);
                            if (nw === 'table') { write('TABLE'); sp(); j += 2; } else j++;
                            prevTok = tok; continue;
                        }
                        if (lw === 'merge') {
                            if (out.trim()) { out = out.trimEnd(); out += '\n\n'; col = 0; }
                            write('MERGE'); sp();
                            const nw = wordAt(j+1);
                            if (nw === 'into') { write('INTO'); sp(); j += 2; } else j++;
                            prevTok = tok; continue;
                        }
                        if (lw === 'call') {
                            if (out.trim()) { out = out.trimEnd(); out += '\n\n'; col = 0; }
                            write('CALL'); sp(); prevTok = tok; j++; continue;
                        }
                    }

                    // ---- SELECT ----
                    if (lw === 'select') {
                        if (depth > 0) { nl(); } else { nl(0); }
                        write('SELECT'); depth++; nl();
                        prevTok = tok; j++; continue;
                    }

                    // ---- FROM ----
                    if (lw === 'from') {
                        depth = Math.max(0, depth - 1);
                        nl(0); write('FROM'); nl(1);
                        prevTok = tok; j++; continue;
                    }

                    // ---- JOIN variants ----
                    if (['join','inner','left','right','full','cross','natural'].includes(lw)) {
                        // try to build full join phrase
                        let phrase = lw; let k = j+1;
                        while (k < toks.length && toks[k].k === 'WORD') {
                            const nw = toks[k].v.toLowerCase();
                            if (['join','inner','outer','left','right','full','cross','natural'].includes(nw)) {
                                phrase += ' '+nw; k++;
                            } else break;
                        }
                        if (JOINS.has(phrase) || phrase.includes('join')) {
                            nl(0); write(phrase.toUpperCase()); nl(1); j = k;
                        } else {
                            // not a join keyword after all — write inline
                            sp(); write(lw); j++;
                        }
                        prevTok = tok; continue;
                    }

                    // ---- ON / USING (join condition) ----
                    if (lw === 'on' && ctx() !== 'CASE') {
                        nl(1); write('ON'); sp();
                        prevTok = tok; j++; continue;
                    }
                    if (lw === 'using') {
                        nl(1); write('USING'); sp();
                        prevTok = tok; j++; continue;
                    }

                    // ---- WHERE ----
                    if (lw === 'where') {
                        nl(0); write('WHERE'); nl(1);
                        prevTok = tok; j++; continue;
                    }

                    // ---- AND / OR (in WHERE / ON / HAVING) at depth 0 or same as clause ----
                    if ((lw === 'and' || lw === 'or') && ctx() !== 'CASE') {
                        nl(0); write(lw.toUpperCase()); sp();
                        prevTok = tok; j++; continue;
                    }

                    // ---- GROUP BY / ORDER BY / PARTITION BY ----
                    if (lw === 'group' && wordAt(j+1) === 'by') {
                        nl(0); write('GROUP BY'); nl(1); j += 2;
                        prevTok = tok; continue;
                    }
                    if (lw === 'order' && wordAt(j+1) === 'by') {
                        nl(0); write('ORDER BY'); nl(1); j += 2;
                        prevTok = tok; continue;
                    }
                    if (lw === 'partition' && wordAt(j+1) === 'by') {
                        sp(); write('PARTITION BY'); sp(); j += 2;
                        prevTok = tok; continue;
                    }

                    // ---- HAVING ----
                    if (lw === 'having') {
                        nl(0); write('HAVING'); nl(1);
                        prevTok = tok; j++; continue;
                    }

                    // ---- LIMIT / OFFSET ----
                    if (lw === 'limit' || lw === 'offset') {
                        nl(0); write(lw.toUpperCase()); sp();
                        prevTok = tok; j++; continue;
                    }

                    // ---- SET (UPDATE … SET  or  SET config_param TO val) ----
                    if (lw === 'set' && ctx() !== 'CASE') {
                        // Peek ahead: if next tokens are word = word/string/num (not a column list),
                        // and depth > 0 (inside a BEGIN block), treat as a config SET → single line
                        const n1 = wordAt(j+1);
                        const n2 = toks[j+2];
                        const isConfigSet = depth > 0 && n1 && n2 &&
                            (n2.k === 'WORD' && ['to','='].includes(n2.v.toLowerCase()) ||
                             (toks[j+2] && toks[j+2].v === '='));
                        if (isConfigSet) {
                            nl(0); write('SET'); sp();
                        } else {
                            nl(0); write('SET'); nl(1);
                        }
                        prevTok = tok; j++; continue;
                    }

                    // ---- VALUES ----
                    if (lw === 'values') {
                        nl(0); write('VALUES'); nl(1);
                        prevTok = tok; j++; continue;
                    }

                        let schema = clean.includes('.') ? clean.split('.')[0].toLowerCase() : '';
                        // Auto-promote to control type if schema is a known control schema
                        if(CONTROL_SCHEMAS.has(schema) && type === 'source') type = 'control';
                        if(!nodesMap.has(key)){
                            if(!schema && (type==='source'||type==='target')) schema='public';
                            nodesMap.set(key,{id:key,label:clean.includes('.')?clean.split('.').join('\n.'):clean,type,schema,col:0,meta:{}});
                        } else {
                            const ex=nodesMap.get(key);
                            if(ex.type==='source'&&type!=='source'){ex.type=type;if(!clean.includes('.'))ex.schema='';}
                        }
                        return key;
                    }
                    const tokens=sql.split(/([\s(),;])/).map(t=>t.trim()).filter(t=>t.length>0);
                    let currentTarget=null,mainTarget=null,parenDepth=0;
                    // Pass 1: register targets
                    for(let i=0;i<tokens.length;i++){
                        let t=tokens[i].toUpperCase();
                        if((t==='WITH'||t===',')&&i+3<tokens.length&&tokens[i+2].toUpperCase()==='AS'&&tokens[i+3]==='('){
                            const name=tokens[i+1];
                            if(name.toUpperCase()!=='SELECT'&&name.toUpperCase()!=='INSERT'&&name.match(/^[a-zA-Z0-9_."#]+$/))addNode(name,'transform');
                        } else if(t==='TABLE'&&i>0&&(tokens[i-1].toUpperCase()==='TEMP'||tokens[i-1].toUpperCase()==='TEMPORARY')){
                            let name=tokens[i+1];
                            if(name.toUpperCase()==='IF'&&i+4<tokens.length&&tokens[i+2].toUpperCase()==='NOT'&&tokens[i+3].toUpperCase()==='EXISTS')name=tokens[i+4];
                            if(name&&name.match(/^[a-zA-Z0-9_."#]+$/))addNode(name,'temp');
                        } else if(t==='TABLE'&&i>=2&&tokens[i-1].toUpperCase()==='EXISTS'&&tokens[i-2].toUpperCase()==='IF'){
                            // DROP TABLE IF EXISTS tmp_name — pre-register so it's never treated as a source
                            const name=tokens[i+1];
                            if(name&&name.match(/^[a-zA-Z0-9_."#]+$/)&&!nodesMap.has(name.toLowerCase()))addNode(name,'temp');
                        } else if(t==='INTO'&&i>0&&tokens[i-1].toUpperCase()==='INSERT'){
                            const name=tokens[i+1];
                            if(name&&name.match(/^[a-zA-Z0-9_."#]+$/))addNode(name,'target');
                        } else if(t==='UPDATE'){
                            const name=tokens[i+1];
                            if(name&&name.match(/^[a-zA-Z0-9_."#]+$/))addNode(name,'target');
                        } else if(t==='DELETE'&&i+2<tokens.length&&tokens[i+1].toUpperCase()==='FROM'){
                            const name=tokens[i+2];
                            if(name.match(/^[a-zA-Z0-9_."#]+$/))addNode(name,'target');
                        }
                    }
                    // Pass 2: dependencies
                    for(let i=0;i<tokens.length;i++){
                        let t=tokens[i].toUpperCase();
                        if(t==='(')parenDepth++;
                        if(t===')')parenDepth--;
                        if(t===';'){currentTarget=null;mainTarget=null;parenDepth=0;}
                        if((t==='WITH'||t===',')&&i+3<tokens.length&&tokens[i+2].toUpperCase()==='AS'&&tokens[i+3]==='('){
                            const name=tokens[i+1];
                            if(name.toUpperCase()!=='SELECT'&&name.toUpperCase()!=='INSERT'&&name.match(/^[a-zA-Z0-9_."#]+$/))currentTarget=addNode(name,'transform');
                        } else if(t==='TABLE'&&i>0&&(tokens[i-1].toUpperCase()==='TEMP'||tokens[i-1].toUpperCase()==='TEMPORARY')){
                            let name=tokens[i+1];
                            if(name.toUpperCase()==='IF'&&i+4<tokens.length&&tokens[i+2].toUpperCase()==='NOT'&&tokens[i+3].toUpperCase()==='EXISTS')name=tokens[i+4];
                            if(name&&name.match(/^[a-zA-Z0-9_."#]+$/)){currentTarget=addNode(name,'temp');mainTarget=currentTarget;}
                        } else if(t==='INTO'&&i>0&&tokens[i-1].toUpperCase()==='INSERT'){
                            const name=tokens[i+1];
                            if(name&&name.match(/^[a-zA-Z0-9_."#]+$/)){currentTarget=addNode(name,'target');mainTarget=currentTarget;}
                        } else if(t==='UPDATE'){
                            const name=tokens[i+1];
                            if(name&&name.match(/^[a-zA-Z0-9_."#]+$/)){

                            }

                            // Also skip DROP TABLE IF EXISTS, control keywords, subquery openers
                            const skipWords = ['SELECT','WHERE','LATERAL','SET','EXISTS'];
                            const skip=!src||!src.match(/^[a-zA-Z0-9_."#]+$/)||skipWords.includes(src.toUpperCase())||/^(v_|p_|l_)/i.test(src);
                            if(!skip){
                                const sk=addNode(src,'source');
                                // Don't draw an edge if src is the same table as current target (UPDATE...FROM self)
                                if(currentTarget&&sk!==currentTarget&&!edgesList.find(e=>e.from===sk&&e.to===currentTarget)){
                                    edgesList.push({from:sk,to:currentTarget,label:t==='JOIN'?'JOIN':'FROM'});

                }

                // ── Level assignment ──
                // ── Off-screen canvas for text measurement ──
                const _measureCanvas = document.createElement('canvas');
                const _mctx = _measureCanvas.getContext('2d');

                function wrapText(text, maxPx, font){
                    _mctx.font = font;
                    if(_mctx.measureText(text).width <= maxPx) return [text];
                    const separatorRe = /([-_.\s])/;
                    const tokens = text.split(separatorRe).filter(Boolean);
                    const lines = [];
                    let cur = '';
                    for(const tok of tokens){
                        const test = cur + tok;
                        if(cur && _mctx.measureText(test).width > maxPx && tok.trim()){
                            if(cur.trim()) lines.push(cur.trimEnd());
                            cur = tok.trimStart();
                        } else {
                            cur = test;
                        }
                    }
                    if(cur.trim()) lines.push(cur.trim());
                    const result = [];
                    for(const line of lines){
                        _mctx.font = font;
                        if(_mctx.measureText(line).width <= maxPx){ result.push(line); continue; }
                        let l='';
                        for(const ch of line){
                            if(_mctx.measureText(l+ch).width > maxPx && l){ result.push(l); l=ch; }
                            else l+=ch;
                        }
                        if(l) result.push(l);
                    }
                    return result.length ? result : [text];
                }

                function computeNodeSize(n){
                    // Node dimensions are fixed for canvas display
                    // _nameLines/_schemaLines are computed only for PNG export text rendering
                    const PAD_L=16, PAD_R=12, STRIPE=4;
                    const NAME_FS=13, SCHEMA_FS=11;
                    const rawLabel=n.label.replace(/\n/g,' ').trim();
                    const tableName=rawLabel.includes('.')?rawLabel.split('.').pop():rawLabel;
                    const nameFontStr=`600 ${NAME_FS}px Segoe UI,sans-serif`;
                    const schemaFontStr=`400 ${SCHEMA_FS}px Segoe UI,sans-serif`;
                    const innerW=NW-STRIPE-PAD_L-PAD_R;
                    // Compute wrapped lines for PNG export only
                    n._nameLines=wrapText(tableName,innerW,nameFontStr);
                    n._schemaLines=n.schema?wrapText(n.schema,innerW,schemaFontStr):[];
                    // Canvas always uses fixed size
                    n.w=NW;
                    n.h=NH;
                }

                function assignLevels(nodesList,edgesList){
                    const nm={};nodesList.forEach(n=>{nm[n.id]=n;});
                    let inDeg={},adj={},radj={};
                    nodesList.forEach(n=>{inDeg[n.id]=0;adj[n.id]=[];radj[n.id]=[];});
                    edgesList.forEach(e=>{if(inDeg[e.to]!==undefined)inDeg[e.to]++;if(adj[e.from])adj[e.from].push(e.to);if(radj[e.to])radj[e.to].push(e.from);});
                    nodesList.forEach(n=>{n.col=inDeg[n.id]===0?0:-1;});
                    const q=[];nodesList.forEach(n=>{if(n.col===0)q.push(n.id);});
                    while(q.length){const u=q.shift(),un=nm[u];adj[u].forEach(v=>{const vn=nm[v];if(!vn)return;if(vn.col<un.col+1)vn.col=un.col+1;inDeg[v]--;if(inDeg[v]===0)q.push(v);});}
                    nodesList.forEach(n=>{if(n.col===-1)n.col=1;});
                    nodesList.forEach(n=>{if(radj[n.id].length===0&&adj[n.id].length>0){const tc=adj[n.id].map(tid=>nm[tid]?nm[tid].col:0);const mc=Math.min(...tc);if(mc>1)n.col=mc-1;}});
                    const uc=[...new Set(nodesList.map(n=>n.col))].sort((a,b)=>a-b);
                    const cr={};uc.forEach((c,i)=>cr[c]=i);
                    nodesList.forEach(n=>{n.col=cr[n.col];});
                    nodesList.forEach(n=>{n.w=NW;n.h=NH;n.x=0;n.y=0;});
                    nodesList.forEach(n=>computeNodeSize(n));
                }

                // ── Layout ──
                function schemaGroupLayout(){
                    const NODE_H=NH+52;
                    const BASE_COL_W=NW+140;
                    const MIN_COL_GAP=50;
                    const byCol={};
                    nodes.forEach(n=>{(byCol[n.col]=byCol[n.col]||[]).push(n);});
                    const colKeys=Object.keys(byCol).map(Number).sort((a,b)=>a-b);
                    const colH={};colKeys.forEach(col=>{const ns=byCol[col];colH[col]=ns.length*NODE_H+Math.max(0,ns.length-1)*4;});
                    const colBulge={};colKeys.forEach(col=>{const N=byCol[col].length;colBulge[col]=N>2?N*13:0;});
                    const colX={};colX[colKeys[0]]=colBulge[colKeys[0]];
                    for(let i=1;i<colKeys.length;i++){const prev=colKeys[i-1],cur=colKeys[i];const maxH=Math.max(colH[prev],colH[cur]);const gap=BASE_COL_W+Math.max(0,(maxH-300)*0.15)+MIN_COL_GAP+colBulge[cur];colX[cur]=colX[prev]+gap;}
                    const xs=colKeys.map(c=>colX[c]);const midX=(Math.min(...xs)+Math.max(...xs))/2;colKeys.forEach(col=>{colX[col]-=midX;});
                    colKeys.forEach(col=>{
                        const ns=byCol[col],N=ns.length,mb=colBulge[col],cx=colX[col],tot=colH[col];
                        let curY=-tot/2;
                        ns.forEach((nd,i)=>{const t=N>1?(i/(N-1))*2-1:0;nd.x=cx-mb*Math.sqrt(1-t*t);nd.y=curY;curY+=NODE_H+4;});
                    });
                    colKeys.forEach(col=>{
                        const ns=byCol[col];if(ns.length<2)return;
                        ns.forEach(nd=>{
                            const ys=[];
                            edges.forEach(e=>{if(e.from===nd.id){const t=nodeMap[e.to];if(t&&t.col!==col)ys.push(t.y);}if(e.to===nd.id){const f=nodeMap[e.from];if(f&&f.col!==col)ys.push(f.y);}});
                            nd._grav=ys.length?ys.reduce((a,b)=>a+b,0)/ys.length:nd.y;
                        });
                        ns.sort((a,b)=>a._grav-b._grav);
                        const tot=colH[col],N=ns.length,mb=colBulge[col],cx=colX[col];
                        let curY=-tot/2;
                        ns.forEach((nd,i)=>{const t=N>1?(i/(N-1))*2-1:0;nd.x=cx-mb*Math.sqrt(1-t*t);nd.y=curY;curY+=NODE_H+4;});
                    });
                    for(let pass=0;pass<10;pass++){
                        const order=pass%2===0?[...colKeys]:[...colKeys].reverse();
                        order.forEach(col=>{
                            const ns=byCol[col],N=ns.length;
                            const pull=N===1?0.55:N<=2?0.62:N<=4?0.38:N<=7?0.2:0.1;
                            ns.forEach(nd=>{
                                const ys=[];
                                edges.forEach(e=>{if(e.from===nd.id){const t=nodeMap[e.to];if(t&&t.col!==col){ys.push(t.y);ys.push(t.y);}}if(e.to===nd.id){const f=nodeMap[e.from];if(f&&f.col!==col)ys.push(f.y);}});
                                if(ys.length){const tgt=ys.reduce((a,b)=>a+b,0)/ys.length;nd.y=nd.y*(1-pull)+tgt*pull;}
                            });
                            if(N>1){
                                ns.sort((a,b)=>a.y-b.y);
                                for(let i=1;i<N;i++){if(ns[i].y-ns[i-1].y<NODE_H+10)ns[i].y=ns[i-1].y+NODE_H+10;}
                                const mean=ns.reduce((s,n)=>s+n.y,0)/N;ns.forEach(nd=>{nd.y-=mean*0.15;});
                            }
                        });
                    }
                    colKeys.forEach(col=>{
                        const ns=byCol[col],N=ns.length,mb=colBulge[col],cx=colX[col];
                        ns.sort((a,b)=>a.y-b.y);
                        ns.forEach((nd,i)=>{const t=N>1?(i/(N-1))*2-1:0;nd.x=cx-mb*Math.sqrt(1-t*t);});
                    });
                    groups=[];
                    colKeys.forEach(col=>{
                        const ns=byCol[col],bySchema={};
                        ns.forEach(n=>{const s=n.schema||'_other';(bySchema[s]=bySchema[s]||[]).push(n);});
                        Object.entries(bySchema).forEach(([schema,gn])=>{
                            if(!schema||schema==='_other')return;
                            const ys=gn.map(n=>n.y);
                            groups.push({schema,type:gn[0].type,x:Math.min(...gn.map(n=>n.x))-10,y:Math.min(...ys)-8,w:NW+20+colBulge[col],h:Math.max(...ys)+NH+8-(Math.min(...ys)-8)+20,col});
                        });
                    });
                }

                // ── Port / edge helpers ──
                function getPort(node,side,tx,ty){
                    const s=w2s(node.x-node.w/2,node.y-node.h/2);
                    const sw=node.w*vp.scale,sh=node.h*vp.scale;
                    const cx=s.x+sw/2,cy=s.y+sh/2;
                    if(tx===undefined){
                        if(side==='right')return{x:s.x+sw,y:cy};
                        if(side==='left')return{x:s.x,y:cy};
                        if(side==='bottom')return{x:cx,y:s.y+sh};
                        if(side==='top')return{x:cx,y:s.y};
                        return{x:cx,y:cy};
                    }
                    const SLIDE=0.62,MARGIN=sw*0.12;
                    if(side==='right'||side==='left'){const ex=side==='right'?s.x+sw:s.x;const raw=cy+(ty-cy)*SLIDE;return{x:ex,y:Math.max(s.y+MARGIN,Math.min(s.y+sh-MARGIN,raw))};}
                    if(side==='top'||side==='bottom'){const ey=side==='bottom'?s.y+sh:s.y;const raw=cx+(tx-cx)*SLIDE;return{x:Math.max(s.x+MARGIN,Math.min(s.x+sw-MARGIN,raw)),y:ey};}
                    return{x:cx,y:cy};
                }
                function getBestPorts(fn,tn){
                    const dx=tn.x-fn.x,dy=tn.y-fn.y,adx=Math.abs(dx),ady=Math.abs(dy);
                    const ratio=adx>1?ady/adx:Infinity;
                    let fromSide,toSide;
                    if(ratio<0.55){if(dx>=0){fromSide='right';toSide='left';}else{fromSide=dy>=0?'bottom':'top';toSide=dy>=0?'top':'bottom';}}
                    else if(ratio>1.8){fromSide=dy>=0?'bottom':'top';toSide=dy>=0?'top':'bottom';}
                    else{if(dx>=0){fromSide='right';toSide='left';if(ady>adx*1.2){fromSide=dy>=0?'bottom':'top';toSide=dy>=0?'top':'bottom';}}else{fromSide=dy>=0?'bottom':'top';toSide=dy>=0?'top':'bottom';}}
                    return{fromSide,toSide};
                }
                function getBezier(fp,tp,fs,ts){
                    const dist=Math.sqrt((tp.x-fp.x)**2+(tp.y-fp.y)**2);
                    const vert=fs==='top'||fs==='bottom';
                    const bend=Math.min(Math.max(dist*(vert?0.38:0.44),50*vp.scale),280*vp.scale);
                    const tang={right:{x:1,y:0},left:{x:-1,y:0},bottom:{x:0,y:1},top:{x:0,y:-1}};
                    const ft=tang[fs],tt=tang[ts];
                    return{cp1x:fp.x+ft.x*bend,cp1y:fp.y+ft.y*bend,cp2x:tp.x+tt.x*bend,cp2y:tp.y+tt.y*bend};
                }
                function isEdgeVisible(fp,tp){
                    const W=cv.width,H=cv.height;
                    return Math.max(fp.x,tp.x)>=0&&Math.min(fp.x,tp.x)<=W&&Math.max(fp.y,tp.y)>=0&&Math.min(fp.y,tp.y)<=H;
                }
                function drawArrow(tip,ang,color){
                    const L=10,W2=5,px=Math.sin(ang)*W2,py=-Math.cos(ang)*W2;
                    ctx2d.beginPath();ctx2d.moveTo(tip.x,tip.y);
                    ctx2d.lineTo(tip.x-L*Math.cos(ang)+px,tip.y-L*Math.sin(ang)+py);
                    ctx2d.lineTo(tip.x-L*Math.cos(ang)-px,tip.y-L*Math.sin(ang)-py);
                    ctx2d.closePath();ctx2d.fillStyle=color;ctx2d.fill();
                }

                // ── Draw functions ──
                function drawBackground(){
                    ctx2d.fillStyle='#ffffff';ctx2d.fillRect(0,0,cv.width,cv.height);
                    if(!nodes.length)return;
                    const base=24;let sp2=base*vp.scale;
                    while(sp2<10)sp2*=2;while(sp2>48)sp2/=2;
                    const sk=Math.round(sp2*4)/4;
                    if(_dotPatternScale!==sk){
                        _dotPatternScale=sk;
                        const sz=Math.round(sp2),pc=document.createElement('canvas');
                        pc.width=sz;pc.height=sz;
                        const px=pc.getContext('2d');
                        px.fillStyle='#dbd9d7';px.beginPath();px.arc(sz/2,sz/2,1.1,0,Math.PI*2);px.fill();
                        _dotPatternCache=ctx2d.createPattern(pc,'repeat');
                    }
                    const ox=((vp.x+cv.width/2)%sp2+sp2)%sp2;
                    const oy=((vp.y+cv.height/2)%sp2+sp2)%sp2;
                    ctx2d.save();ctx2d.translate(ox-sp2/2,oy-sp2/2);
                    ctx2d.fillStyle=_dotPatternCache;
                    ctx2d.fillRect(-sp2,-sp2,cv.width+sp2*2,cv.height+sp2*2);
                    ctx2d.restore();
                }

                function drawNode(n){
                    const s=w2s(n.x-n.w/2,n.y-n.h/2);
                    const sw=n.w*vp.scale,sh=n.h*vp.scale;
                    if(s.x+sw<0||s.x>cv.width||s.y+sh<0||s.y>cv.height)return;
                    const th=TH[n.type]||TH.source;
                    const isHov=hov&&hov.id===n.id,isSel=sel&&sel.id===n.id;
                    const inChain=hovChain&&hovChain.has(n.id)&&!isHov;
                    const active=isHov||isSel||inChain;
                    const [rb,gb,bb]=h2rgb(th.border);
                    // Shadow + background
                    ctx2d.save();ctx2d.shadowColor=active?`rgba(${rb},${gb},${bb},.22)`:'rgba(0,0,0,.09)';ctx2d.shadowBlur=active?16:6;ctx2d.shadowOffsetY=active?3:1.5;
                    ctx2d.fillStyle='#fff';rr(s.x,s.y,sw,sh,4);ctx2d.fill();ctx2d.restore();
                    ctx2d.fillStyle=active?th.bg:'#fff';rr(s.x,s.y,sw,sh,4);ctx2d.fill();
                    ctx2d.strokeStyle=active?th.border:`rgba(${rb},${gb},${bb},.28)`;ctx2d.lineWidth=active?1.8:1;rr(s.x,s.y,sw,sh,4);ctx2d.stroke();

                    const stW=4*vp.scale;
                    ctx2d.fillStyle=th.stripe;ctx2d.save();ctx2d.beginPath();
                    ctx2d.moveTo(s.x,s.y+4);ctx2d.quadraticCurveTo(s.x,s.y,s.x+4,s.y);
                    ctx2d.lineTo(s.x+stW,s.y);ctx2d.lineTo(s.x+stW,s.y+sh);
                    ctx2d.lineTo(s.x+4,s.y+sh);ctx2d.quadraticCurveTo(s.x,s.y+sh,s.x,s.y+sh-4);
                    ctx2d.closePath();ctx2d.fill();ctx2d.restore();
                    if(vp.scale<0.2)return;
                    // Icon circle (top-left corner)
                    if(vp.scale>0.4){
                        const ir=15*vp.scale;
                        ctx2d.beginPath();ctx2d.arc(s.x,s.y,ir,0,Math.PI*2);
                        ctx2d.fillStyle=th.iconBg;ctx2d.fill();
                        ctx2d.strokeStyle=th.border;ctx2d.lineWidth=1;
                        ctx2d.beginPath();ctx2d.arc(s.x,s.y,ir,0,Math.PI*2);ctx2d.stroke();
                        ctx2d.font=`${Math.max(11,13*vp.scale)}px Segoe UI`;
                        ctx2d.textAlign='center';ctx2d.textBaseline='middle';
                        ctx2d.fillStyle=th.border;ctx2d.fillText(th.icon,s.x,s.y);ctx2d.textBaseline='alphabetic';
                    }
                    // Text layout — single line with ellipsis truncation
                    const padL=12*vp.scale,cx2=s.x+stW+padL,maxW=sw-stW-padL-8*vp.scale;
                    const rawLabel=n.label.replace(/\n/g,' ').trim();
                    const tableName=rawLabel.includes('.')?rawLabel.split('.').pop():rawLabel.split('\n').pop()||rawLabel;
                    if(n.schema&&vp.scale>0.45){
                        const sfs=Math.max(9,11*vp.scale);ctx2d.font=`400 ${sfs}px Segoe UI,sans-serif`;
                        ctx2d.fillStyle=active?th.border:`rgba(${rb},${gb},${bb},0.6)`;ctx2d.textAlign='left';
                        let sl=n.schema;while(ctx2d.measureText(sl).width>maxW&&sl.length>2)sl=sl.slice(0,-1);
                        if(sl!==n.schema)sl=sl.slice(0,-1)+'\u2026';
                        ctx2d.fillText(sl,cx2,s.y+sh*0.42);
                    }
                    const nfs=Math.max(11,13*vp.scale);ctx2d.font=`600 ${nfs}px Segoe UI,sans-serif`;
                    ctx2d.fillStyle=active?'#111':'#1a1a1a';ctx2d.textAlign='left';
                    let tl=tableName;while(ctx2d.measureText(tl).width>maxW&&tl.length>2)tl=tl.slice(0,-1);
                    if(tl.length<tableName.length)tl=tl.slice(0,-1)+'\u2026';
                    ctx2d.fillText(tl,cx2,n.schema&&vp.scale>0.45?s.y+sh*0.72:s.y+sh*0.62);
                    // Selection ring
                    if(isSel){ctx2d.strokeStyle=th.border;ctx2d.lineWidth=2.5;rr(s.x-1.5,s.y-1.5,sw+3,sh+3,5);ctx2d.stroke();}
                    // Hover port dot — only on directly hovered node
                    if(isHov&&vp.scale>0.4){
                        ctx2d.beginPath();ctx2d.arc(s.x+sw,s.y+sh/2,5*vp.scale,0,Math.PI*2);ctx2d.fillStyle=th.border;ctx2d.fill();
                        ctx2d.beginPath();ctx2d.arc(s.x+sw,s.y+sh/2,3*vp.scale,0,Math.PI*2);ctx2d.fillStyle='#fff';ctx2d.fill();
                    }
                }

                function drawEdgeLine(e){
                    const fn=nodeMap[e.from],tn=nodeMap[e.to];if(!fn||!tn)return;
                    const{fromSide,toSide}=getBestPorts(fn,tn);
                    const fsc=w2s(fn.x,fn.y),tsc=w2s(tn.x,tn.y);
                    const fp=getPort(fn,fromSide,tsc.x,tsc.y),tp=getPort(tn,toSide,fsc.x,fsc.y);
                    if(!isEdgeVisible(fp,tp))return;
                    const inChain=hovChain&&hovChain.has(fn.id)&&hovChain.has(tn.id);
                    const selActive=!hovChain&&sel&&(sel.id===fn.id||sel.id===tn.id);
                    const active=inChain||selActive;
                    const th1=TH[fn.type],isCtrl=fn.type==='control'||tn.type==='control';
                    const arrowOff=active?11:9;
                    const toDir={left:{dx:-1,dy:0},right:{dx:1,dy:0},top:{dx:0,dy:-1},bottom:{dx:0,dy:1}}[toSide]||{dx:0,dy:0};
                    const tpStop={x:tp.x-toDir.dx*arrowOff,y:tp.y-toDir.dy*arrowOff};
                    ctx2d.save();ctx2d.beginPath();ctx2d.moveTo(fp.x,fp.y);
                    if(vp.scale<0.25){ctx2d.lineTo(tpStop.x,tpStop.y);}
                    else{const{cp1x,cp1y,cp2x,cp2y}=getBezier(fp,tpStop,fromSide,toSide);ctx2d.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,tpStop.x,tpStop.y);}
                    ctx2d.strokeStyle=active?th1.border:'#bbb7b3';ctx2d.lineWidth=active?2.2:1.4;
                    if(isCtrl)ctx2d.setLineDash([4,3]);
                    ctx2d.stroke();ctx2d.setLineDash([]);ctx2d.restore();
                    if(e.label&&vp.scale>0.45){
                        const mx=(fp.x+tp.x)/2,my=(fp.y+tp.y)/2-8*vp.scale,fs=Math.max(8,9*vp.scale);
                        ctx2d.font=`600 ${fs}px Consolas,monospace`;ctx2d.textAlign='center';ctx2d.textBaseline='middle';
                        ctx2d.fillStyle=active?th1.border:'#9a9693';ctx2d.fillText(e.label,mx,my);ctx2d.textBaseline='alphabetic';
                    }
                }

                function drawEdgeArrow(e){
                    const fn=nodeMap[e.from],tn=nodeMap[e.to];if(!fn||!tn)return;
                    const{fromSide,toSide}=getBestPorts(fn,tn);
                    const fsc=w2s(fn.x,fn.y),tsc=w2s(tn.x,tn.y);
                    const fp=getPort(fn,fromSide,tsc.x,tsc.y),tp=getPort(tn,toSide,fsc.x,fsc.y);
                    if(!isEdgeVisible(fp,tp))return;
                    const inChain=hovChain&&hovChain.has(fn.id)&&hovChain.has(tn.id);
                    const selActive=!hovChain&&sel&&(sel.id===fn.id||sel.id===tn.id);
                    const active=inChain||selActive;
                    const{cp1x,cp1y,cp2x,cp2y}=getBezier(fp,tp,fromSide,toSide);
                    const tdx=tp.x-cp2x,tdy=tp.y-cp2y;
                    const ang=Math.abs(tdx)<0.01&&Math.abs(tdy)<0.01?Math.atan2(tp.y-fp.y,tp.x-fp.x):Math.atan2(tdy,tdx);
                    drawArrow(tp,ang,active?TH[fn.type].border:'#666260');
                }

                function getChain(id){
                    const s=new Set([id]);const up=[id],dn=[id];
                    while(up.length){const c=up.pop();edges.forEach(e=>{if(e.to===c&&!s.has(e.from)){s.add(e.from);up.push(e.from);}});}
                    while(dn.length){const c=dn.pop();edges.forEach(e=>{if(e.from===c&&!s.has(e.to)){s.add(e.to);dn.push(e.to);}});}
                    return s;
                }

                function _doRender(){
                    _rafPending=false;
                    hovChain=(hov&&!dragNode)?getChain(hov.id):null;
                    drawBackground();
                    // pass 1: edges
                    edges.forEach(e=>{
                        const inC=!hovChain||(hovChain.has(e.from)&&hovChain.has(e.to));
                        if(!inC){ctx2d.save();ctx2d.globalAlpha=0.35;}
                        drawEdgeLine(e);
                        if(!inC)ctx2d.restore();
                    });
                    // pass 2: nodes
                    nodes.forEach(n=>{
                        const inC=!hovChain||hovChain.has(n.id);
                        if(!inC){ctx2d.save();ctx2d.globalAlpha=0.4;}
                        drawNode(n);
                        if(!inC)ctx2d.restore();
                        if(selGroup.has(n.id)){
                            const sp=w2s(n.x-n.w/2,n.y-n.h/2),sw2=n.w*vp.scale,sh2=n.h*vp.scale;
                            ctx2d.save();ctx2d.strokeStyle='#0078d4';ctx2d.lineWidth=2;ctx2d.setLineDash([4,3]);
                            ctx2d.shadowColor='rgba(0,120,212,0.35)';ctx2d.shadowBlur=6;
                            rr(sp.x-3,sp.y-3,sw2+6,sh2+6,6);ctx2d.stroke();ctx2d.setLineDash([]);ctx2d.restore();
                        }
                    });
                    // pass 3: arrowheads
                    if(vp.scale>=0.12){edges.forEach(e=>{const inC=!hovChain||(hovChain.has(e.from)&&hovChain.has(e.to));if(!inC){ctx2d.save();ctx2d.globalAlpha=0.35;}drawEdgeArrow(e);if(!inC)ctx2d.restore();});}
                    // pass 4: rubber-band
                    if(rubberBand){
                        const x=Math.min(rubberBand.sx,rubberBand.ex),y=Math.min(rubberBand.sy,rubberBand.ey);
                        const w2=Math.abs(rubberBand.ex-rubberBand.sx),h2=Math.abs(rubberBand.ey-rubberBand.sy);
                        ctx2d.save();ctx2d.fillStyle='rgba(0,120,212,0.06)';ctx2d.fillRect(x,y,w2,h2);
                        ctx2d.strokeStyle='rgba(0,120,212,0.7)';ctx2d.lineWidth=1.5;ctx2d.setLineDash([5,3]);ctx2d.strokeRect(x,y,w2,h2);ctx2d.setLineDash([]);ctx2d.restore();
                    }
                    if(_minimapDirty){_minimapDirty=false;drawMinimap();}
                }

                function drawMinimap(){
                    if(!nodes.length){mmCtx.clearRect(0,0,MM_W,MM_H);return;}
                    mmCtx.clearRect(0,0,MM_W,MM_H);
                    const mnx=Math.min(...nodes.map(n=>n.x-n.w/2)),mxx=Math.max(...nodes.map(n=>n.x+n.w/2));
                    const mny=Math.min(...nodes.map(n=>n.y-n.h/2)),mxy=Math.max(...nodes.map(n=>n.y+n.h/2));
                    const ww=mxx-mnx||1,wh2=mxy-mny||1;
                    const pad=6,sc=Math.min((MM_W-pad*2)/ww,(MM_H-pad*2)/wh2);
                    const ox=pad+(MM_W-pad*2-ww*sc)/2,oy=pad+(MM_H-pad*2-wh2*sc)/2;
                    const wx2=x=>ox+(x-mnx)*sc,wy2=y=>oy+(y-mny)*sc;
                    mmCtx.strokeStyle='#ccc';mmCtx.lineWidth=0.5;
                    edges.forEach(e=>{const fn=nodeMap[e.from],tn=nodeMap[e.to];if(!fn||!tn)return;mmCtx.beginPath();mmCtx.moveTo(wx2(fn.x+fn.w/2),wy2(fn.y));mmCtx.lineTo(wx2(tn.x-tn.w/2),wy2(tn.y));mmCtx.stroke();});
                    nodes.forEach(n=>{const th=TH[n.type]||TH.source;mmCtx.fillStyle=th.border;mmCtx.fillRect(wx2(n.x-n.w/2),wy2(n.y-n.h/2),Math.max(4,n.w*sc),Math.max(2,n.h*sc));});
                    const vl=s2w(0,0),vr=s2w(cv.width,cv.height);
                    const vx=wx2(vl.x),vy=wy2(vl.y),vw2=(vr.x-vl.x)*sc,vh2=(vr.y-vl.y)*sc;
                    mmCtx.strokeStyle='rgba(0,120,212,.7)';mmCtx.lineWidth=1.5;mmCtx.strokeRect(vx,vy,vw2,vh2);
                    mmCtx.fillStyle='rgba(0,120,212,.07)';mmCtx.fillRect(vx,vy,vw2,vh2);
                    mmCv._sc=sc;mmCv._ox=ox;mmCv._oy=oy;mmCv._mnx=mnx;mmCv._mny=mny;
                }

                // ── parseAndRender (exposed to button) ──
                // ── Clear canvas completely ──
                function clearCanvas(){

                    undoStack=[]; redoStack=[]; updUndoBtn();
