                }

                function parseAndRender(sql){
                    if(!sql||!sql.trim()){setDfStatus({text:'',err:false,n:0,e:0});return;}
                    try{
                        const parsed=parseSQL(sql);
                        nodes=parsed.nodes; edges=parsed.edges;
                        nodeMap={}; nodes.forEach(n=>nodeMap[n.id]=n);
                        if(!nodes.length){setDfStatus({text:'No tables found. Check your SQL.',err:true,n:0,e:0});return;}
                        assignLevels(nodes,edges); schemaGroupLayout();
                        nodeDefaults={}; nodes.forEach(n=>nodeDefaults[n.id]={x:n.x,y:n.y});
                        undoStack=[]; redoStack=[]; updUndoBtn();
                        hov=null; sel=null; selGroup.clear(); dragNode=null; // clear stale selection
                        setDfNodeDetail(null); // close stale detail panel on re-render
                        _everFit = false; // new data — must fit once
                        // If canvas already has real dimensions (tab visible, no split change pending),
                        // fit immediately. Otherwise ResizeObserver / resetFit will handle it.
                        if(cv.width > 0 && cv.height > 0){
                            _everFit = true;

                        } else {

                        }
                        const typeCounts = {source:0,temp:0,transform:0,target:0,control:0};
                        nodes.forEach(n=>{ if(typeCounts[n.type]!==undefined) typeCounts[n.type]++; });
                        setDfStatus({text:'',err:false,n:nodes.length,e:edges.length,types:typeCounts});
                        setDfEmpty(false);
                    }catch(err){setDfStatus({text:'Error: '+err.message,err:true,n:0,e:0});}
                }

                // ── Undo/redo ──
                function updUndoBtn(){
                    if(dfEngineRef.current){dfEngineRef.current.canUndo=undoStack.length>0;dfEngineRef.current.canRedo=redoStack.length>0;}
                    setDfUndoState({u:undoStack.length>0,r:redoStack.length>0});
                }
                function undoMove(){
                    if(!undoStack.length)return;
                    const s=undoStack.pop();
                    if(s.type==='group'){const fwd=[];s.snap.forEach(({id,x,y})=>{const nd=nodeMap[id];if(!nd)return;fwd.push({id,x:nd.x,y:nd.y});nd.x=x;nd.y=y;});redoStack.push({type:'group',snap:fwd});}
                    else{const nd=nodeMap[s.id];if(!nd)return;redoStack.push({type:'single',id:nd.id,x:nd.x,y:nd.y});nd.x=s.x;nd.y=s.y;}
                    scheduleRender(true);updUndoBtn();
                }
                function redoMove(){
                    if(!redoStack.length)return;
                    const s=redoStack.pop();
                    if(s.type==='group'){const bwd=[];s.snap.forEach(({id,x,y})=>{const nd=nodeMap[id];if(!nd)return;bwd.push({id,x:nd.x,y:nd.y});nd.x=x;nd.y=y;});undoStack.push({type:'group',snap:bwd});}
                    else{const nd=nodeMap[s.id];if(!nd)return;undoStack.push({type:'single',id:nd.id,x:nd.x,y:nd.y});nd.x=s.x;nd.y=s.y;}
                    scheduleRender(true);updUndoBtn();
                }

                // ── Mouse interactions ──
                let _movePending=false;
                const onMouseDown=e=>{
                    if(e.button===1){e.preventDefault();panDrag=true;dragStart={x:e.clientX,y:e.clientY};vpStart={...vp};cv.style.cursor='grabbing';return;}
                    if(e.button!==0)return;
                    const rect=cv.getBoundingClientRect();
                    const sx=e.clientX-rect.left,sy=e.clientY-rect.top;
                    const w=s2w(sx,sy);didMove=false;
                    if(panMode){panDrag=true;dragStart={x:e.clientX,y:e.clientY};vpStart={...vp};cv.style.cursor='grabbing';return;}
                    const hit=nodes.find(n=>w.x>=n.x-n.w/2&&w.x<=n.x+n.w/2&&w.y>=n.y-n.h/2&&w.y<=n.y+n.h/2);
                    if(hit){
                        if(selGroup.has(hit.id)&&selGroup.size>1){
                            groupDrag=true;groupDragStart={wx:w.x,wy:w.y};groupDragOffsets=[];
                            selGroup.forEach(id=>{const nd=nodeMap[id];if(nd){nd._dsx=nd.x;nd._dsy=nd.y;groupDragOffsets.push({id,ox:nd.x-w.x,oy:nd.y-w.y});}});
                            cv.style.cursor='grabbing';
                        } else {
                            selGroup.clear();hit._dsx=hit.x;hit._dsy=hit.y;
                            dragNode=hit;dragNodeOffset={x:w.x-hit.x,y:w.y-hit.y};sel=hit;cv.style.cursor='grabbing';
                        }
                        render();
                    } else {
                        selGroup.clear();sel=null;
                        setDfNodeDetail(null); // close detail on empty click
                        if(nodes.length){rubberBand={sx,sy,ex:sx,ey:sy};cv.style.cursor='crosshair';}
                        else{panDrag=true;dragStart={x:e.clientX,y:e.clientY};vpStart={...vp};cv.style.cursor='grabbing';}
                        render();
                    }
                };
                const onMouseUp=e=>{
                    if(groupDrag){
                        if(didMove){const snap=groupDragOffsets.map(o=>{const nd=nodeMap[o.id];return{id:o.id,x:nd._dsx,y:nd._dsy};});undoStack.push({type:'group',snap});if(undoStack.length>50)undoStack.shift();redoStack.length=0;updUndoBtn();}
                        groupDrag=false;groupDragStart=null;groupDragOffsets=[];cv.style.cursor=hov?'grab':'default';render();
                    }
                    if(dragNode){
                        if(didMove){undoStack.push({type:'single',id:dragNode.id,x:dragNode._dsx,y:dragNode._dsy});if(undoStack.length>50)undoStack.shift();redoStack.length=0;updUndoBtn();}
                        else {
                            // Single click (no drag) — show detail panel
                            const n=dragNode;
                            const ins=edges.filter(e=>e.to===n.id).map(e=>({...e,_fromType:nodeMap[e.from]?.type||'source'}));
                            const outs=edges.filter(e=>e.from===n.id).map(e=>({...e,_toType:nodeMap[e.to]?.type||'target'}));
                            setDfNodeDetail({node:n, ins, outs});
                        }
                        dragNode=null;cv.style.cursor=hov?'grab':'default';render();
                    }
                    if(rubberBand){
                        const x1=Math.min(rubberBand.sx,rubberBand.ex),x2=Math.max(rubberBand.sx,rubberBand.ex);
                        const y1=Math.min(rubberBand.sy,rubberBand.ey),y2=Math.max(rubberBand.sy,rubberBand.ey);
                        if(x2-x1>6||y2-y1>6){const w1=s2w(x1,y1),w2=s2w(x2,y2);selGroup.clear();nodes.forEach(n=>{if(n.x+n.w/2>=w1.x&&n.x-n.w/2<=w2.x&&n.y+n.h/2>=w1.y&&n.y-n.h/2<=w2.y)selGroup.add(n.id);});}
                        rubberBand=null;cv.style.cursor='default';render();
                    }
                    if(panDrag){panDrag=false;cv.style.cursor=panMode?'grab':hov?'grab':'default';}
                    hideTip();
                };
                const onMouseMove=e=>{
                    if(_movePending)return;_movePending=true;
                    requestAnimationFrame(()=>{
                        _movePending=false;
                        const rect=cv.getBoundingClientRect();
                        const mx=e.clientX-rect.left,my=e.clientY-rect.top;
                        if(groupDrag){didMove=true;const w=s2w(mx,my);groupDragOffsets.forEach(o=>{const nd=nodeMap[o.id];if(nd){nd.x=w.x+o.ox;nd.y=w.y+o.oy;}});scheduleRender(false);return;}
                        if(dragNode){didMove=true;const w=s2w(mx,my);dragNode.x=w.x-dragNodeOffset.x;dragNode.y=w.y-dragNodeOffset.y;scheduleRender(false);return;}
                        if(rubberBand){didMove=true;rubberBand.ex=mx;rubberBand.ey=my;scheduleRender(false);return;}
                        if(panDrag){didMove=true;vp.x=vpStart.x+(e.clientX-dragStart.x);vp.y=vpStart.y+(e.clientY-dragStart.y);updZ();scheduleRender(true);return;}
                        const w=s2w(mx,my);const prev=hov;
                        hov=nodes.find(n=>w.x>=n.x-n.w/2&&w.x<=n.x+n.w/2&&w.y>=n.y-n.h/2&&w.y<=n.y+n.h/2)||null;
                        cv.style.cursor=panMode?'grab':hov?'grab':'default';
                        if(hov){showTip(hov,e.clientX,e.clientY);}else{hideTip();}
                        if(prev!==hov)scheduleRender(false);
                    });
                };
                const onWheel=e=>{
                    e.preventDefault();
                    const f=e.deltaY<0?1.1:0.91;
                    const rect=cv.getBoundingClientRect();
                    doZoom(f,e.clientX-rect.left,e.clientY-rect.top);
                };
                const onCtxMenu=e=>{e.preventDefault();};

                cv.addEventListener('mousedown',onMouseDown);
                window.addEventListener('mouseup',onMouseUp);
                window.addEventListener('mousemove',onMouseMove);
                cv.addEventListener('wheel',onWheel,{passive:false});
                cv.addEventListener('contextmenu',onCtxMenu);

                // minimap click
                const onMmDown=e=>{
                    if(!mmCv._sc)return;
                    const rect=mmCv.getBoundingClientRect();
                    const mx=e.clientX-rect.left,my=e.clientY-rect.top;
                    vp.x=-((mx-mmCv._ox)/mmCv._sc+mmCv._mnx)*vp.scale;
                    vp.y=-((my-mmCv._oy)/mmCv._sc+mmCv._mny)*vp.scale;
                    updZ();render();
                };
                mmCv.addEventListener('mousedown',onMmDown);

                // resize observer
                let _resizeT=null;
                const ro=new ResizeObserver(()=>{clearTimeout(_resizeT);_resizeT=setTimeout(()=>{resize();if(nodes.length)render();},_everFit?80:16);});
                ro.observe(cwEl);

                // ── Export PNG (offscreen, full diagram, 2× DPR) ──
                function exportPNG(){
                    if(!nodes.length) return;
                    const pad=48;
                    const mnx=Math.min(...nodes.map(n=>n.x-n.w/2)),mxx=Math.max(...nodes.map(n=>n.x+n.w/2));
                    const mny=Math.min(...nodes.map(n=>n.y-n.h/2)),mxy=Math.max(...nodes.map(n=>n.y+n.h/2));
                    const W=mxx-mnx+pad*2, H=mxy-mny+pad*2;
                    const DPR=2;
                    const off=document.createElement('canvas');
                    off.width=W*DPR; off.height=H*DPR;
                    const oc=off.getContext('2d');
                    oc.scale(DPR,DPR);
                    // background
                    oc.fillStyle='#f8f7f6'; oc.fillRect(0,0,W,H);
                    oc.save();
                    oc.translate(-mnx+pad,-mny+pad);
                    // rounded rect helper
                    function _rc(x,y,w,h,r){oc.beginPath();oc.moveTo(x+r,y);oc.lineTo(x+w-r,y);oc.quadraticCurveTo(x+w,y,x+w,y+r);oc.lineTo(x+w,y+h-r);oc.quadraticCurveTo(x+w,y+h,x+w-r,y+h);oc.lineTo(x+r,y+h);oc.quadraticCurveTo(x,y+h,x,y+h-r);oc.lineTo(x,y+r);oc.quadraticCurveTo(x,y,x+r,y);oc.closePath();}
                    // edges
                    edges.forEach(e2=>{
                        const fn=nodeMap[e2.from],tn=nodeMap[e2.to]; if(!fn||!tn)return;
                        const {fromSide,toSide}=getBestPorts(fn,tn);
                        function xport(node,side){const cx=node.x,cy=node.y,hw=node.w/2,hh=node.h/2;if(side==='right')return{x:cx+hw,y:cy};if(side==='left')return{x:cx-hw,y:cy};if(side==='bottom')return{x:cx,y:cy+hh};return{x:cx,y:cy-hh};}
                        const fp=xport(fn,fromSide),tp=xport(tn,toSide);
                        const dist=Math.sqrt((tp.x-fp.x)**2+(tp.y-fp.y)**2);
                        const bend=Math.min(Math.max(dist*0.42,40),200);
                        const tang={right:{x:1,y:0},left:{x:-1,y:0},bottom:{x:0,y:1},top:{x:0,y:-1}};
                        const ft=tang[fromSide],tt=tang[toSide];
                        oc.beginPath();oc.moveTo(fp.x,fp.y);
                        oc.bezierCurveTo(fp.x+ft.x*bend,fp.y+ft.y*bend,tp.x+tt.x*bend,tp.y+tt.y*bend,tp.x,tp.y);
                        oc.strokeStyle='#ccc8c3';oc.lineWidth=1.2;
                        if(fn.type==='control'||tn.type==='control')oc.setLineDash([4,3]);
                        oc.stroke();oc.setLineDash([]);
                        oc.beginPath();oc.arc(fp.x,fp.y,2.8,0,Math.PI*2);oc.fillStyle='#c2bdb8';oc.fill();
                        const tangDir={left:Math.PI,right:0,top:-Math.PI/2,bottom:Math.PI/2};
                        const ha=tangDir[toSide];
                        const [r2,g2,b2]=h2rgb(TH[tn.type].border);
                        oc.beginPath();oc.moveTo(tp.x,tp.y);oc.lineTo(tp.x-8*Math.cos(ha-.38),tp.y-8*Math.sin(ha-.38));oc.lineTo(tp.x-8*Math.cos(ha+.38),tp.y-8*Math.sin(ha+.38));oc.closePath();
                        oc.fillStyle=`rgba(${r2},${g2},${b2},.3)`;oc.fill();
                        if(e2.label){
                            const mx2=(fp.x+tp.x)/2,my2=(fp.y+tp.y)/2-7;
                            oc.font='600 9.5px Segoe UI,sans-serif';oc.textAlign='center';oc.textBaseline='middle';
                            const tw=oc.measureText(e2.label).width+8,th3=14;
                            oc.fillStyle='#f3f2f1';_rc(mx2-tw/2,my2-th3/2,tw,th3,2);oc.fill();
                            oc.strokeStyle='#d4d0cc';oc.lineWidth=1;_rc(mx2-tw/2,my2-th3/2,tw,th3,2);oc.stroke();
                            oc.fillStyle='#8a8a8a';oc.fillText(e2.label,mx2,my2);oc.textBaseline='alphabetic';
                        }
                    });
                    // nodes
                    nodes.forEach(n=>{
                        const th2=TH[n.type]||TH.source;const [rb,gb2,bb]=h2rgb(th2.border);
                        const sx=n.x-n.w/2,sy=n.y-n.h/2;
                        oc.save();oc.shadowColor='rgba(0,0,0,.09)';oc.shadowBlur=6;oc.shadowOffsetY=1.5;
                        oc.fillStyle='#fff';_rc(sx,sy,n.w,n.h,4);oc.fill();oc.restore();
                        oc.fillStyle='#fff';_rc(sx,sy,n.w,n.h,4);oc.fill();

                        // wrapped text — use cached lines from computeNodeSize
                        const textX=sx+stW+16;
                        const LINE_H=22;
                        const nameLines=n._nameLines||[n.label.replace(/\n/g,' ').trim()];
                        const schemaLines=n._schemaLines||[];
                        const totalLines=schemaLines.length+nameLines.length;
                        const blockH=totalLines*LINE_H;
                        let curY=sy+(n.h-blockH)/2+LINE_H*0.8;
                        if(schemaLines.length){
                            oc.font='400 13px Segoe UI,sans-serif';oc.fillStyle=`rgba(${rb},${gb2},${bb},0.65)`;oc.textAlign='left';

            // Apply dark mode class to <html>

            const reqIdRef     = useRef(0);
            // Cache results per mode — avoids reprocessing the same input twice
            const resultCache  = useRef({}); // { 'minify:true:false': {text, output, stats}, ... }

            function getWorker() {
                if (workerRef.current) return workerRef.current;
                
                const src = [
                    // Pulling string definitions from global scope since we isolated them from Babel
                    window.astMinifyEngine.toString(),
                    window.sqlBeautify.toString(),
                    `self.onmessage = function(e) {
                        var d = e.data, text = d.text, mode = d.mode, autoAlias = d.autoAlias, removeNL = d.removeNL, reqId = d.reqId;

                                        className="p-1.5 rounded-md text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-700 transition-colors flex items-center justify-center">

                                            <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" />

                        {/* LEFT — Input */}

                                        </button>

                                                <circle cx="13" cy="3" r="1.5"/>
                                                <circle cx="13" cy="13" r="1.5"/>

                                            <Download className="h-3.5 w-3.5" />
                                        </button>
                                    </Tooltip>

                                    <div style={{width:64,height:64,margin:'0 auto 12px',background:'#fff',border:'1px solid #e1dfdd',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 1.6px 3.6px rgba(0,0,0,.12)'}}>

                                            style={{width:30,height:30,display:'flex',alignItems:'center',justifyContent:'center',background:'transparent',border:'none',cursor:'pointer',color:'#605e5c'}}

                                            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M1 5V2h3M12 2h3v3M15 11v3h-3M4 14H1v-3"/><rect x="4" y="4" width="8" height="8" rx="1"/></svg>

                                            <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><path d="M5.5 3.5V9"/><path d="M5.5 3.5a1 1 0 011-1v0a1 1 0 011 1V7"/><path d="M7.5 7V3.5a1 1 0 011-1v0a1 1 0 011 1V7"/><path d="M9.5 7V5a1 1 0 011-1v0a1 1 0 011 1v3.5c0 2.5-1.5 4-3.5 4h-.5A3.5 3.5 0 014 9V7a1 1 0 011-1v0a1 1 0 011 1"/></svg>

                                            onMouseEnter={e=>{e.currentTarget.style.background='#f3f2f1';e.currentTarget.style.color='#201f1e';}} onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color='#605e5c';}}>+</button>

                                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M2 6h7a4 4 0 010 8H5"/><path d="M2 6l3-3-3 3 3 3-3-3z"/></svg>

                                            onMouseEnter={e=>{if(dfUndoState.r){e.currentTarget.style.background='#f3f2f1';e.currentTarget.style.color='#201f1e';}}} onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color='#605e5c';}}>
                                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M14 6H7a4 4 0 000 8h4"/><path d="M14 6l-3-3 3 3-3 3 3-3z"/></svg>
                                        </button>

                                        temp:    {bg:'#fce4d6',border:'#ca5010',label:'TEMP TABLE', icon:'⚙'},
                                        transform:{bg:'#ede4f5',border:'#5c2d91',label:'CTE',        icon:'◈'},
                                        target:  {bg:'#dff6dd',border:'#107c10',label:'TARGET',     icon:'▤'},
                                        control: {bg:'#d2f0ed',border:'#008272',label:'CONTROL',    icon:'◎'},
                                    };
                                    const {node:n, ins, outs} = dfNodeDetail;
                                    const th = TH_COLORS[n.type] || TH_COLORS.source;
                                    const displayName = n.label.replace(/\n/g, '.').trim();
                                    return (
                                        <div style={{
                                            position:'absolute',top:10,right:12,width:240,
                                            background:'#fff',border:'1px solid #e1dfdd',borderRadius:6,
                                            boxShadow:'0 6px 16px rgba(0,0,0,.13),0 1px 4px rgba(0,0,0,.08)',

                                                </div>
                                                <button onClick={()=>setDfNodeDetail(null)}

                                            </div>

                                                {n.schema && (
                                                    <div style={{marginBottom:8}}>
                                                        <div style={{fontSize:9,fontWeight:700,color:'#a19f9d',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:3}}>Schema</div>
                                                        <span style={{display:'inline-block',padding:'1px 7px',borderRadius:3,background:th.bg,color:th.border,fontSize:10.5,fontFamily:'Consolas,monospace'}}>{n.schema}</span>

                                                )}

                                                    <div style={{marginBottom:8}}>

                                                            const frType = ed._fromType || 'source';
                                                            const fc = TH_COLORS[frType]?.border || '#666';
                                                            const fbg = TH_COLORS[frType]?.bg || '#f3f2f1';
                                                            const lbl = ed.from.split('.').pop();
                                                            return <span key={i} style={{display:'inline-block',padding:'1px 6px',borderRadius:3,background:fbg,color:fc,fontSize:10.5,fontFamily:'Consolas,monospace',lineHeight:1.6}}>{lbl}{ed.label ? ' · '+ed.label : ''}</span>;

                                                        </div>
                                                    </div>

                                                {outs.length > 0 && (
                                                    <div style={{marginBottom:4}}>
                                                        <div style={{fontSize:9,fontWeight:700,color:'#a19f9d',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:4}}>Writes to ({outs.length})</div>

                                                        {outs.map((ed,i)=>{
                                                            const toType = ed._toType || 'target';
                                                            const tc = TH_COLORS[toType]?.border || '#666';
                                                            const tbg = TH_COLORS[toType]?.bg || '#f3f2f1';
                                                            const lbl = ed.to.split('.').pop();
                                                            return <span key={i} style={{display:'inline-block',padding:'1px 6px',borderRadius:3,background:tbg,color:tc,fontSize:10.5,fontFamily:'Consolas,monospace',lineHeight:1.6}}>{lbl}{ed.label ? ' · '+ed.label : ''}</span>;
                                                        })}
                                                        </div>
                                                    </div>
                                                )}
                                                {!n.schema && !ins.length && !outs.length && (
                                                    <span style={{color:'#a19f9d',fontSize:11}}>No connections found</span>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })()}

                                            <span style={{fontSize:12,color:c,lineHeight:1}}>{icon}</span>
                                            {l}

                                </div>
                            </div>

                            {/* Status bar */}
                            <div className="shrink-0 border-t border-slate-200 dark:border-slate-700 bg-white flex items-center px-3 text-xs gap-2 overflow-x-auto" style={{color:'#605e5c', height: dfStatus.n > 0 ? 'auto' : '2rem', minHeight:'2rem', paddingTop: dfStatus.n > 0 ? '5px' : undefined, paddingBottom: dfStatus.n > 0 ? '5px' : undefined, flexWrap:'wrap'}}>
                                {dfStatus.err ? (
                                    <span style={{color:'#a4262c'}}>{dfStatus.text}</span>
                                ) : dfStatus.n > 0 ? (
                                    <>
                                        {[
                                            {label:'Nodes', val:dfStatus.n, color:'#1e293b'},
                                            {label:'Edges', val:dfStatus.e, color:'#1e293b'},
                                            {label:'Base Tables', val:dfStatus.types?.source, color:'#0078d4'},
                                            {label:'Temp Tables', val:dfStatus.types?.temp, color:'#ca5010'},
                                            {label:'CTEs', val:dfStatus.types?.transform, color:'#5c2d91'},
                                            {label:'Targets', val:dfStatus.types?.target, color:'#107c10'},
                                            {label:'Control', val:dfStatus.types?.control, color:'#008272'},
                                        ].filter(item => item.val > 0).map((item, i, arr) => (
                                            <React.Fragment key={item.label}>
                                                <span style={{whiteSpace:'nowrap'}}>
                                                    {item.label}:{' '}
                                                    <strong style={{color: item.color}}>{item.val}</strong>
                                                </span>
                                                {i < arr.length - 1 && <span style={{color:'#d1d5db', userSelect:'none'}}>·</span>}
                                            </React.Fragment>
                                        ))}
                                    </>
                                ) : null}
                            </div>
                        </div>

                        {/* RIGHT — Editor Output (always mounted, hidden when on dataflow tab) */}
                        <div className="flex flex-col overflow-hidden bg-white dark:bg-slate-900 border-l border-slate-200 dark:border-slate-800" style={{...rightStyle, display: activeTab === 'dataflow' ? 'none' : 'flex'}}>
                            <div className="shrink-0 h-11 border-b border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/60 flex items-center justify-between px-2">
                                <div className="flex items-center gap-1 shrink-0">
                                    {/* Mode toggle pills */}
                                    <div className="flex items-center gap-0.5 bg-slate-200/80 dark:bg-slate-700/80 rounded-lg p-0.5">
                                        <Tooltip content="Minify SQL — strip whitespace & comments" position="bottom-left">
                                            <button onClick={()=>{ handleModeSwitch('minify'); setActiveTab('editor'); }}
                                                aria-label="Minify mode"
                                                className={`flex items-center gap-1 px-2 py-1 rounded-md text-xs font-semibold transition-all ${
                                                    mode === 'minify' && activeTab === 'editor'
                                                        ? 'bg-white dark:bg-slate-900 text-blue-600 dark:text-blue-400 shadow-sm'
                                                        : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200'
                                                }`}>
                                                <svg className="h-3 w-3 shrink-0" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M2 4h12M4 8h8M6 12h4"/></svg>
                                                <span className="hidden sm:inline">Minify</span>
                                            </button>
                                        </Tooltip>
                                        <Tooltip content="Beautify SQL — format with indentation" position="bottom-left">
                                            <button onClick={()=>{ handleModeSwitch('beautify'); setActiveTab('editor'); }}
                                                aria-label="Beautify mode"
                                                className={`flex items-center gap-1 px-2 py-1 rounded-md text-xs font-semibold transition-all ${
                                                    mode === 'beautify' && activeTab === 'editor'
                                                        ? 'bg-white dark:bg-slate-900 text-violet-600 dark:text-violet-400 shadow-sm'
                                                        : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200'
                                                }`}>
                                                <Wand2 className="h-3 w-3 shrink-0" />
                                                <span className="hidden sm:inline">Beautify</span>
                                            </button>
                                        </Tooltip>
                                        <Tooltip content="Visualise SQL data flow on canvas" position="bottom-left">
                                            <button onClick={()=>{ const next = activeTab === 'dataflow' ? 'editor' : 'dataflow'; if (next === 'dataflow' && !userAdjustedSplit.current && inputTextRef.current.trim()) setSplitPct(20); setActiveTab(next); }}
                                                aria-label="Data flow view"
                                                className={`flex items-center gap-1 px-2 py-1 rounded-md text-xs font-semibold transition-all ${
                                                    activeTab === 'dataflow'
                                                        ? 'bg-white dark:bg-slate-900 text-blue-600 dark:text-blue-400 shadow-sm'
                                                        : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200'
                                                }`}>
                                                <svg className="h-3 w-3 shrink-0" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
                                                    <circle cx="3" cy="8" r="1.5"/>
                                                    <circle cx="13" cy="3" r="1.5"/>
                                                    <circle cx="13" cy="13" r="1.5"/>
                                                    <path d="M4.4 7.3L11.6 3.7M4.4 8.7L11.6 12.3"/>
                                                </svg>
                                                <span className="hidden sm:inline">Data Flow</span>
                                            </button>
                                        </Tooltip>
                                    </div>
                                </div>
                                <div className="flex items-center gap-0.5 shrink-0">
                                    {mode === 'minify' && (
                                    <div className="flex items-center gap-0.5">
                                        <Tooltip content="Auto-generate aliases for tables (Redshift-compatible)" position="bottom-right">
                                            <label className="flex items-center gap-1 cursor-pointer px-1.5 py-1 rounded hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
                                                <input type="checkbox" checked={autoAlias} onChange={e=>setAutoAlias(e.target.checked)} className="w-3 h-3 rounded accent-blue-600 shrink-0" />
                                                <Settings2 className="h-3 w-3 text-slate-500 dark:text-slate-400 shrink-0" />
                                                {splitPct < 65 && <span className="text-xs text-slate-500 dark:text-slate-400 whitespace-nowrap">Auto Alias</span>}
                                            </label>
                                        </Tooltip>
                                        <Tooltip content="Output as a single line (removes all newlines)" position="bottom-right">
                                            <label className="flex items-center gap-1 cursor-pointer px-1.5 py-1 rounded hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
                                                <input type="checkbox" checked={removeNL} onChange={e=>setRemoveNL(e.target.checked)} className="w-3 h-3 rounded accent-purple-600 shrink-0" />
                                                <svg className="h-3 w-3 shrink-0 text-slate-500 dark:text-slate-400" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M2 5h12M2 8h12M2 11h12"/><path d="M13 7l2 1-2 1"/></svg>
                                                {splitPct < 65 && <span className="text-xs text-slate-500 dark:text-slate-400 whitespace-nowrap">Single Line</span>}
                                            </label>
                                        </Tooltip>
                                        <div className="w-px h-4 bg-slate-200 dark:bg-slate-700 shrink-0 mx-0.5" />
                                    </div>
                                    )}
                                    <Tooltip content={copied ? 'Copied!' : 'Copy to clipboard'} position="bottom-right">
                                        <button onClick={handleCopy} disabled={!outputText} aria-label="Copy to clipboard"
                                            className={`flex items-center justify-center w-7 h-7 rounded-md border shadow-sm transition-all active:scale-95 disabled:opacity-40 disabled:cursor-not-allowed
                                                ${copied
                                                    ? 'border-emerald-400 text-emerald-700 bg-emerald-50 dark:border-emerald-600 dark:text-emerald-400 dark:bg-emerald-900/20'
                                                    : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:border-slate-300 dark:hover:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                                            {copied ? <Check className="h-3.5 w-3.5" /> : <Copy className="h-3.5 w-3.5" />}
                                        </button>
                                    </Tooltip>
                                    <Tooltip content={mode === 'beautify' ? 'Download .fmt.sql' : 'Download .min.sql'} position="bottom-right">
                                        <button onClick={handleDownload} disabled={!outputText} aria-label="Download SQL file"
                                            className="flex items-center justify-center w-7 h-7 rounded-md bg-blue-50 dark:bg-blue-950/40 border border-blue-200 dark:border-blue-800 text-blue-600 dark:text-blue-400 hover:bg-blue-100 dark:hover:bg-blue-900/40 shadow-sm transition-all active:scale-95 disabled:opacity-40 disabled:cursor-not-allowed">
                                            <Download className="h-3.5 w-3.5" />
                                        </button>
                                    </Tooltip>
                                </div>
                            </div>
                            
                            <div className="flex-1 overflow-hidden min-h-0 bg-white dark:bg-slate-900">
                                {mode === 'beautify' && outputText ? (
                                    <pre className="w-full h-full overflow-auto p-4 font-fira text-sm leading-relaxed whitespace-pre-wrap break-words m-0 selection:bg-blue-200 dark:selection:bg-blue-900/50">
                                        {syntaxHighlight(outputText)}
                                    </pre>
                                ) : (
                                    <textarea
                                        value={outputText}
                                        readOnly
                                        placeholder={mode === 'beautify' ? 'Beautified output will appear here…' : 'Minified output will appear here…'}
                                        className="w-full h-full resize-none p-4 focus:outline-none font-fira text-sm leading-relaxed text-slate-700 dark:text-slate-400 bg-transparent placeholder-slate-300 dark:placeholder-slate-700"
                                        spellCheck="false"
                                    />
                                )}
                            </div>

                            {/* STATS PANEL */}
                            {mode === 'minify' && stats && outputText && showReport && (
                                <div className="shrink-0 border-t border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/60 overflow-y-auto stats-reveal" style={{maxHeight:'min(16rem, 40vh)'}}>
                                    <div className="px-3 pt-2.5 pb-2">
                                        <div className="flex items-center gap-1.5 mb-2">
                                            <Activity className="h-3.5 w-3.5 text-blue-500 dark:text-blue-400" />
                                            <span className="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Minification Report</span>
                                        </div>
                                        <div className="grid grid-cols-3 gap-1.5 mb-2">
                                            {[
                                                { label:'Original Size',     val:formatBytes(stats.originalSize),  cls:'text-slate-700 dark:text-slate-300' },
                                                { label:'Minified Size',     val:formatBytes(stats.minifiedSize),  cls:'text-emerald-600 dark:text-emerald-400' },
                                                { label:'Space Saved',       val:`${stats.reduction}%`,            cls:'text-emerald-700 dark:text-emerald-400', accent:true },
                                                { label:'Original Lines',    val:stats.originalLines.toLocaleString(), cls:'text-slate-700 dark:text-slate-300' },
                                                { label:'Output Lines',      val:stats.minifiedLines.toLocaleString(), cls:'text-blue-600 dark:text-blue-400' },
                                                { label:'Lines Removed',     val:`${(stats.originalLines-stats.minifiedLines).toLocaleString()} (${stats.lineReduction}%)`, cls:'text-purple-600 dark:text-purple-400' },
                                                { label:'Original Chars',    val:stats.originalChars.toLocaleString(), cls:'text-slate-700 dark:text-slate-300' },
                                                { label:'Output Chars',      val:stats.minifiedChars.toLocaleString(), cls:'text-blue-600 dark:text-blue-400' },
                                                { label:'Comments Stripped', val:`${stats.totalComments} (${stats.singleLineComments}-- / ${stats.multiLineComments}/**/)`, cls:'text-orange-600 dark:text-orange-400' },
                                            ].map(({label,val,cls,accent}) => (
                                                <div key={label} className={`${accent?'bg-emerald-50 dark:bg-emerald-900/20 border-emerald-200 dark:border-emerald-800':'bg-white dark:bg-slate-900/60 border-slate-200 dark:border-slate-700'} border rounded-md px-2.5 py-1.5`}>
                                                    <div className="text-[10px] text-slate-400 dark:text-slate-500 mb-0.5">{label}</div>
                                                    <div className={`text-xs font-semibold ${cls}`}>{val}</div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="h-1.5 w-full bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden mb-1">
                                            <div className="h-full rounded-full bg-gradient-to-r from-blue-500 to-emerald-500 transition-all duration-700"
                                                style={{width:`${parseFloat(stats.reduction)}%`}} />
                                        </div>
                                        <div className="flex justify-between text-[10px] text-slate-400 dark:text-slate-600">
                                            <span>0%</span>
                                            <span className="font-medium text-emerald-600 dark:text-emerald-400">{stats.reduction}% saved</span>
                                            <span>100%</span>
                                        </div>
                                    </div>
                                </div>
                            )}

                            <div className="shrink-0 h-7 bg-slate-50/80 dark:bg-slate-800/80 border-t border-slate-200 dark:border-slate-800 grid grid-cols-3 items-center px-3 text-xs text-slate-400 dark:text-slate-500">
                                {mode === 'minify'
                                    ? <span className="tabular-nums">{stats ? <><span className="text-emerald-600 dark:text-emerald-400 font-medium">{formatBytes(stats.minifiedSize)}</span> final</> : '—'}</span>
                                    : <span className="tabular-nums">{outputText ? <><span className="text-slate-600 dark:text-slate-300 font-medium">{outputText.split('\n').filter(l=>l.trim()).length}</span> lines</> : '—'}</span>
                                }
                                {mode === 'minify' && stats && (
                                    <Tooltip content={showReport ? 'Hide report' : 'Show minification report'} position="top">
                                        <button onClick={()=>setShowReport(v=>!v)} aria-label="Toggle minification report"
                                            className={`justify-self-center flex items-center gap-1.5 px-2 py-0.5 rounded-full transition-all cursor-pointer hover:scale-105 active:scale-95 ${
                                                showReport
                                                    ? 'bg-amber-100 dark:bg-amber-950/60 border border-amber-300 dark:border-amber-700'
                                                    : 'border border-transparent hover:border-slate-200 dark:hover:border-slate-700'
                                            }`}>
                                            <span className={`inline-flex items-center justify-center w-4 h-4 rounded-full transition-all ${
                                                showReport
                                                    ? 'bg-gradient-to-br from-yellow-300 to-amber-400 dark:from-amber-500 dark:to-amber-600'
                                                    : 'bg-slate-100 dark:bg-slate-700 border border-slate-300 dark:border-slate-600'
                                            }`}>
                                                <Lightbulb className={`h-2.5 w-2.5 transition-all ${
                                                    showReport
                                                        ? 'text-amber-700 dark:text-amber-100 fill-amber-500 dark:fill-amber-300'
                                                        : 'text-slate-400 dark:text-slate-500'
                                                }`} />
                                            </span>
                                            <span className={`text-xs font-semibold tabular-nums ${
                                                showReport ? 'text-amber-700 dark:text-amber-200' : 'text-emerald-600 dark:text-emerald-400'
                                            }`}>{stats.reduction}% saved</span>
                                        </button>
                                    </Tooltip>
                                )}
                            </div>
                        </div>

                    </main>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
