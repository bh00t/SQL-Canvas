                                <div className="flex items-center gap-2">
                                    {/* Mode toggle pills */}
                                    <div className="flex items-center gap-0.5 bg-slate-200 dark:bg-slate-700 rounded-lg p-0.5">
                                        <Tooltip content="Minify SQL — strip whitespace & comments" position="bottom-left">
                                            <button onClick={()=>handleModeSwitch('minify')}
                                                className={`flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-semibold transition-all ${
                                                    mode === 'minify'
                                                        ? 'bg-white dark:bg-slate-900 text-blue-600 dark:text-blue-400 shadow-sm'
                                                        : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200'
                                                }`}>
                                                <Zap className="h-3 w-3" />
                                                Minify
                                            </button>
                                        </Tooltip>
                                        <Tooltip content="Beautify SQL — format with indentation" position="bottom-left">
                                            <button onClick={()=>handleModeSwitch('beautify')}
                                                className={`flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-semibold transition-all ${
                                                    mode === 'beautify'
                                                        ? 'bg-white dark:bg-slate-900 text-violet-600 dark:text-violet-400 shadow-sm'
                                                        : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200'
                                                }`}>
                                                <Wand2 className="h-3 w-3" />
                                                Beautify
                                            </button>
                                        </Tooltip>
                                    </div>
                                </div>
                                <div className="flex items-center gap-2">
                                    {mode === 'minify' && (
                                    <div className="flex items-center gap-1.5">
                                        <Tooltip content="Auto-generate aliases for unaliased tables" position="bottom-right">
                                            <label className="flex items-center gap-1 cursor-pointer px-2 py-1 rounded hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors whitespace-nowrap">
                                                <input type="checkbox" checked={autoAlias} onChange={e=>setAutoAlias(e.target.checked)} className="w-3 h-3 rounded accent-blue-600" />
                                                <Settings2 className="h-3 w-3 text-slate-500 dark:text-slate-400" />
                                                <span className="text-xs font-medium text-slate-600 dark:text-slate-400 hidden lg:inline">Auto-Alias</span>
                                            </label>
                                        </Tooltip>
                                        <Tooltip content="Output as a single line (removes all newlines)" position="bottom-right">
                                            <label className="flex items-center gap-1 cursor-pointer px-2 py-1 rounded hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors whitespace-nowrap">
                                                <input type="checkbox" checked={removeNL} onChange={e=>setRemoveNL(e.target.checked)} className="w-3 h-3 rounded accent-purple-600" />
                                                <Zap className="h-3 w-3 text-slate-500 dark:text-slate-400" />
                                                <span className="text-xs font-medium text-slate-600 dark:text-slate-400 hidden lg:inline">Single Line</span>
                                            </label>
                                        </Tooltip>
                                        <div className="w-px h-4 bg-slate-200 dark:bg-slate-700 shrink-0" />
                                    </div>
                                    )}
                                    <Tooltip content={copied ? 'Copied!' : 'Copy to clipboard'} position="bottom-right">
                                        <button onClick={handleCopy} disabled={!outputText}
                                            className={`flex items-center gap-1.5 px-2.5 py-1 text-xs font-medium rounded-md border shadow-sm transition-all disabled:opacity-40 disabled:cursor-not-allowed
                                                ${copied
                                                    ? 'border-emerald-400 text-emerald-600 bg-emerald-50 dark:border-emerald-500 dark:text-emerald-400 dark:bg-emerald-900/20'
                                                    : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:border-slate-300 dark:hover:border-slate-600'}`}>
                                            {copied ? <Check className="h-3.5 w-3.5" /> : <Copy className="h-3.5 w-3.5" />}
                                            {copied ? 'Copied!' : 'Copy'}
                                        </button>
                                    </Tooltip>
                                    <Tooltip content={mode === 'beautify' ? 'Download beautified SQL file' : 'Download minified SQL file'} position="bottom-right">
                                        <button onClick={handleDownload} disabled={!outputText}
                                            className="flex items-center justify-center p-1.5 rounded-md bg-blue-50 dark:bg-blue-900/30 border border-blue-200 dark:border-blue-800 text-blue-700 dark:text-blue-400 hover:bg-blue-100 dark:hover:bg-blue-900/50 shadow-sm transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                                            <Download className="h-3.5 w-3.5" />
                                        </button>
                                    </Tooltip>
                                </div>
                            </div>
                            
                            <div className="flex-1 overflow-hidden min-h-0 bg-white dark:bg-slate-900">
                                {mode === 'beautify' && outputText ? (
                                    <pre className="w-full h-full overflow-auto p-4 font-fira text-sm leading-relaxed whitespace-pre-wrap break-words m-0 selection:bg-blue-200 dark:selection:bg-blue-900/50">
                                        {syntaxHighlight(outputText)}
                                    </pre>
                                ) : (
                                    <textarea
                                        value={outputText}
                                        readOnly
                                        placeholder={mode === 'beautify' ? 'Beautified output will appear here…' : 'Minified output will appear here…'}
                                        className="w-full h-full resize-none p-4 focus:outline-none font-fira text-sm leading-relaxed text-slate-700 dark:text-slate-400 bg-transparent placeholder-slate-300 dark:placeholder-slate-700"
                                        spellCheck="false"
                                    />
                                )}
                            </div>

                            {/* STATS PANEL */}
                            {mode === 'minify' && stats && outputText && showReport && (
                                <div className="shrink-0 border-t border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/60 overflow-y-auto max-h-64 stats-reveal">
                                    <div className="px-3 pt-2.5 pb-2">
                                        <div className="flex items-center gap-1.5 mb-2">
                                            <Activity className="h-3.5 w-3.5 text-blue-500 dark:text-blue-400" />
                                            <span className="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Minification Report</span>
                                        </div>
                                        <div className="grid grid-cols-2 md:grid-cols-3 gap-1.5 mb-2">
                                            {[
                                                { label:'Original Size',     val:formatBytes(stats.originalSize),  cls:'text-slate-700 dark:text-slate-300' },
                                                { label:'Minified Size',     val:formatBytes(stats.minifiedSize),  cls:'text-emerald-600 dark:text-emerald-400' },
                                                { label:'Space Saved',       val:`${stats.reduction}%`,            cls:'text-emerald-700 dark:text-emerald-400', accent:true },
                                                { label:'Original Lines',    val:stats.originalLines.toLocaleString(), cls:'text-slate-700 dark:text-slate-300' },
                                                { label:'Output Lines',      val:stats.minifiedLines.toLocaleString(), cls:'text-blue-600 dark:text-blue-400' },
                                                { label:'Lines Removed',     val:`${(stats.originalLines-stats.minifiedLines).toLocaleString()} (${stats.lineReduction}%)`, cls:'text-purple-600 dark:text-purple-400' },
                                                { label:'Original Chars',    val:stats.originalChars.toLocaleString(), cls:'text-slate-700 dark:text-slate-300', md:true },
                                                { label:'Output Chars',      val:stats.minifiedChars.toLocaleString(), cls:'text-blue-600 dark:text-blue-400', md:true },
                                                { label:'Comments Stripped', val:`${stats.totalComments} (${stats.singleLineComments}-- / ${stats.multiLineComments}/**/)`, cls:'text-orange-600 dark:text-orange-400' },
                                            ].map(({label,val,cls,accent,md}) => (
                                                <div key={label} className={`${md?'hidden md:block':''} ${accent?'bg-emerald-50 dark:bg-emerald-900/20 border-emerald-200 dark:border-emerald-800':'bg-white dark:bg-slate-900/60 border-slate-200 dark:border-slate-700'} border rounded-md px-2.5 py-1.5`}>
                                                    <div className="text-xs text-slate-400 dark:text-slate-500 mb-0.5">{label}</div>
                                                    <div className={`text-xs font-semibold ${cls}`}>{val}</div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="h-1.5 w-full bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden mb-1">
                                            <div className="h-full rounded-full bg-gradient-to-r from-blue-500 to-emerald-500 transition-all duration-700"
                                                style={{width:`${parseFloat(stats.reduction)}%`}} />
                                        </div>
                                        <div className="flex justify-between text-xs text-slate-400 dark:text-slate-600">
                                            <span>0%</span>
                                            <span>100%</span>
                                        </div>
                                    </div>
                                </div>
                            )}

                            <div className="shrink-0 h-8 bg-slate-50 dark:bg-slate-800/80 border-t border-slate-200 dark:border-slate-800 grid grid-cols-3 items-center px-3 text-xs text-slate-500 dark:text-slate-400">
                                {mode === 'minify'
                                    ? <span>Final: {stats ? formatBytes(stats.minifiedSize) : '—'}</span>
                                    : <span>Output: {outputText ? `${outputText.split('\n').filter(l=>l.trim()).length} lines` : '—'}</span>
                                }
                                {mode === 'minify' && stats && (
                                    <Tooltip content={showReport ? 'Hide minification report' : 'Show minification report'} position="top">
                                        <button onClick={()=>setShowReport(v=>!v)}
                                            className={`justify-self-center flex items-center gap-1.5 px-2.5 py-0.5 rounded-full transition-all cursor-pointer hover:scale-105 active:scale-95 ${
                                                showReport
                                                    ? 'bg-amber-100 dark:bg-amber-950/60 border border-amber-300 dark:border-amber-700'
                                                    : 'border border-transparent'
                                            }`}>
                                            <span className={`inline-flex items-center justify-center w-5 h-5 rounded-full transition-all shadow-sm ${
                                                showReport
                                                    ? 'bg-gradient-to-br from-yellow-300 to-amber-400 dark:from-amber-500 dark:to-amber-600 border border-amber-300 dark:border-amber-500'
                                                    : 'bg-slate-100 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 hover:border-amber-300 dark:hover:border-amber-500'
                                            }`}>
                                                <Lightbulb className={`h-3 w-3 transition-all ${
                                                    showReport
                                                        ? 'text-amber-700 dark:text-amber-100 fill-amber-500 dark:fill-amber-300'
                                                        : 'text-slate-400 dark:text-slate-500'
                                                }`} />
                                            </span>
                                            <span className={`text-xs font-semibold tabular-nums transition-colors ${
                                                showReport
                                                    ? 'text-amber-700 dark:text-amber-200'
                                                    : 'text-emerald-600 dark:text-emerald-400'
                                            }`}>{stats.reduction}% saved</span>
                                        </button>
                                    </Tooltip>
                                )}

                            </div>
                        </div>

                    </main>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
